<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRANSOL — Client Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --void:#060608;--deep:#0a0a10;--surface:#111118;--lift:#18181f;--panel:#1e1e27;
  --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.14);
  --text:#f0eff5;--sub:rgba(240,239,245,.75);--ter:rgba(240,239,245,.45);
  --iris:#7c83e5;--aqua:#06d6a0;--violet:#c77dff;--rose:#ff6b9d;
  --gold:#ffd166;--sky:#45b7d1;--ember:#ff8c42;
  --chrome:linear-gradient(135deg,#ff6b9d,#ff8c42,#ffd166,#06d6a0,#4ecdc4,#45b7d1,#7c83e5,#c77dff);
  --glass-bg:rgba(255,255,255,.045);
  --glass-bg-hover:rgba(255,255,255,.07);
  --glass-border:rgba(255,255,255,.1);
  --glass-strong:rgba(255,255,255,.06);
  --sidebar-w:240px;--topbar-h:60px;
}
html,body{height:100%;overflow:hidden;}
body{
  background:#04040a;
  color:var(--text);font-family:'DM Sans',sans-serif;
  display:flex;flex-direction:column;
  position:relative;
}
body::before{
  content:'';
  position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 50% 50% at 75% 10%, rgba(124,131,229,.60) 0%, transparent 60%),
    radial-gradient(ellipse 38% 52% at 5%  78%, rgba(6,214,160,.48)   0%, transparent 58%),
    radial-gradient(ellipse 46% 40% at 94% 88%, rgba(199,125,255,.42) 0%, transparent 58%),
    radial-gradient(ellipse 32% 28% at 42% 52%, rgba(255,107,157,.22) 0%, transparent 52%),
    radial-gradient(ellipse 28% 24% at 18% 18%, rgba(69,183,209,.26)  0%, transparent 48%),
    radial-gradient(ellipse 70% 70% at 50% 50%, rgba(4,4,10,.92)      0%, transparent 100%);
  pointer-events:none;
}
#app,#loginScreen{position:relative;z-index:2;}

@keyframes cSpin{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
@keyframes orbDrift1{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(60px,-40px) scale(1.08)}66%{transform:translate(-30px,50px) scale(.94)}}
@keyframes orbDrift2{0%,100%{transform:translate(0,0) scale(1)}40%{transform:translate(-70px,30px) scale(1.05)}75%{transform:translate(40px,-60px) scale(.96)}}
@keyframes orbDrift3{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(50px,40px) scale(1.07)}}

/* ── ORBS ── */
.orb-layer{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden;}
.orb{position:absolute;border-radius:50%;filter:blur(80px);}
.orb1{width:560px;height:480px;top:-80px;right:10%;background:rgba(124,131,229,.45);animation:orbDrift1 18s ease-in-out infinite;}
.orb2{width:440px;height:520px;bottom:-60px;left:-60px;background:rgba(6,214,160,.38);animation:orbDrift2 22s ease-in-out infinite;}
.orb3{width:380px;height:360px;bottom:5%;right:-40px;background:rgba(199,125,255,.36);animation:orbDrift3 16s ease-in-out infinite;}
.orb4{width:260px;height:260px;top:40%;left:30%;background:rgba(255,107,157,.18);animation:orbDrift1 26s ease-in-out infinite reverse;}
.orb5{width:300px;height:280px;top:15%;left:5%;background:rgba(69,183,209,.22);animation:orbDrift2 20s ease-in-out infinite reverse;}

.chrome-text{background:var(--chrome);background-size:300% 300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:cSpin 5s ease infinite;}
.chrome-bg{background:var(--chrome);background-size:300% 300%;animation:cSpin 4s ease infinite;}

/* ══════════════════════════════════════════
   LOGIN SCREEN
══════════════════════════════════════════ */
#loginScreen{
  position:fixed;inset:0;z-index:1000;
  background:var(--void);
  background-image:
    radial-gradient(ellipse 60% 55% at 65% 25%, rgba(124,131,229,.55) 0%, transparent 62%),
    radial-gradient(ellipse 45% 48% at 15% 80%, rgba(6,214,160,.42) 0%, transparent 58%),
    radial-gradient(ellipse 35% 30% at 85% 75%, rgba(199,125,255,.35) 0%, transparent 55%);
  display:flex;align-items:center;justify-content:center;flex-direction:column;
}
.login-box{
  width:420px;
  background:rgba(8,8,16,.45);
  backdrop-filter:blur(48px) saturate(200%);
  -webkit-backdrop-filter:blur(48px) saturate(200%);
  border:1px solid rgba(255,255,255,.18);
  box-shadow:0 32px 80px rgba(0,0,0,.6), 0 0 0 1px rgba(255,255,255,.05) inset, inset 0 1px 0 rgba(255,255,255,.15);
  padding:48px;
  animation:fadeUp .6s ease;
}
.login-logo{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;margin-bottom:36px;display:block;}
.login-title{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;letter-spacing:-.04em;margin-bottom:6px;}
.login-sub{font-size:14px;color:var(--sub);margin-bottom:32px;}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
.field label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.26em;text-transform:uppercase;color:var(--ter);}
.field input{
  background:rgba(255,255,255,.05);
  border:1px solid var(--glass-border);
  color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;
  padding:12px 14px;outline:none;transition:border-color .2s;
  backdrop-filter:blur(8px);
}
.field input:focus{border-color:var(--iris);background:rgba(124,131,229,.07);}
.login-roles{display:flex;gap:8px;margin-bottom:24px;}
.role-btn{
  flex:1;padding:9px;border:1px solid var(--glass-border);
  background:rgba(255,255,255,.03);
  font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.2em;text-transform:uppercase;
  color:var(--ter);cursor:pointer;transition:all .18s;
}
.role-btn:hover{background:rgba(255,255,255,.06);color:var(--sub);}
.role-btn.active{background:rgba(124,131,229,.15);border-color:rgba(124,131,229,.5);color:var(--iris);}
.login-btn{
  width:100%;padding:14px;background:var(--chrome);background-size:300% 300%;
  animation:cSpin 4s ease infinite;border:none;color:#060608;
  font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.3em;text-transform:uppercase;
  cursor:pointer;font-weight:700;transition:opacity .2s;
}
.login-btn:hover{opacity:.88;}
.login-hint{font-size:12px;color:var(--ter);text-align:center;margin-top:16px;}

/* ══════════════════════════════════════════
   APP SHELL
══════════════════════════════════════════ */
#app{display:none;flex:1;overflow:hidden;flex-direction:row;}

/* SIDEBAR — glass panel */
.sidebar{
  width:var(--sidebar-w);flex-shrink:0;
  background:rgba(4,4,10,.55);
  backdrop-filter:blur(28px) saturate(180%);
  -webkit-backdrop-filter:blur(28px) saturate(180%);
  border-right:1px solid rgba(255,255,255,.12);
  display:flex;flex-direction:column;
  height:100vh;overflow-y:auto;
}
.sidebar-logo{
  padding:20px 20px 16px;
  font-family:'Syne',sans-serif;font-size:16px;font-weight:800;letter-spacing:-.02em;
  border-bottom:1px solid var(--glass-border);
  display:flex;align-items:center;gap:8px;flex-shrink:0;
}
.sidebar-logo .role-tag{
  font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.18em;text-transform:uppercase;
  padding:3px 7px;background:rgba(124,131,229,.15);border:1px solid rgba(124,131,229,.35);
  color:var(--iris);margin-left:auto;
}
.sidebar-logo .role-tag.admin{background:rgba(255,107,157,.1);border-color:rgba(255,107,157,.35);color:var(--rose);}

.nav-section{padding:12px 10px 4px;flex-shrink:0;}
.nav-item{
  display:flex;align-items:center;gap:10px;padding:10px 12px;
  font-size:13.5px;font-weight:400;color:var(--sub);cursor:pointer;
  border-radius:6px;transition:all .15s;margin-bottom:2px;
  border:1px solid transparent;user-select:none;
}
.nav-item:hover{background:var(--glass-bg-hover);color:var(--text);border-color:var(--glass-border);}
.nav-item.active{
  background:rgba(124,131,229,.12);
  border-color:rgba(124,131,229,.25);
  color:var(--text);font-weight:500;
  box-shadow:inset 0 0 20px rgba(124,131,229,.05);
}
.nav-item.active .nav-icon{color:var(--iris);}
.nav-icon{font-size:14px;width:18px;text-align:center;flex-shrink:0;opacity:.8;}
.nav-badge{margin-left:auto;font-family:'DM Mono',monospace;font-size:8px;
  background:var(--rose);color:#fff;padding:2px 6px;border-radius:999px;font-weight:700;}

.sidebar-footer{margin-top:auto;padding:16px;border-top:1px solid var(--glass-border);flex-shrink:0;}
.user-chip{display:flex;align-items:center;gap:10px;}
.user-avatar{
  width:32px;height:32px;border-radius:50%;
  background:var(--chrome);background-size:300% 300%;animation:cSpin 4s ease infinite;
  display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-size:11px;font-weight:800;color:#060608;flex-shrink:0;
}
.user-name{font-size:13px;font-weight:500;color:var(--text);}
.user-org{font-size:11px;color:var(--ter);}
.logout-btn{margin-left:auto;font-size:12px;color:var(--ter);cursor:pointer;padding:4px;}
.logout-btn:hover{color:var(--rose);}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}

/* TOPBAR — glass */
.topbar{
  height:var(--topbar-h);flex-shrink:0;
  border-bottom:1px solid var(--glass-border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 32px;
  background:rgba(4,4,10,.45);
  backdrop-filter:blur(24px) saturate(160%);
  -webkit-backdrop-filter:blur(24px) saturate(160%);
}
.topbar-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;letter-spacing:-.03em;}
.topbar-actions{display:flex;align-items:center;gap:10px;}
.tb-btn{
  font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.2em;text-transform:uppercase;
  padding:9px 18px;border:1px solid var(--glass-border);
  background:var(--glass-bg);color:var(--sub);cursor:pointer;transition:all .18s;
  backdrop-filter:blur(8px);border-radius:4px;
}
.tb-btn:hover{background:var(--glass-bg-hover);border-color:var(--border2);color:var(--text);}
.tb-btn.primary{background:var(--chrome);background-size:300% 300%;animation:cSpin 4s ease infinite;color:#060608;border-color:transparent;font-weight:700;}

/* CONTENT */
.content{flex:1;overflow-y:auto;padding:32px;}
.content.hidden{display:none;}

/* ══════════════════════════════════════════
   COMMON COMPONENTS
══════════════════════════════════════════ */
.page-header{margin-bottom:28px;animation:fadeUp .4s ease;}
.page-header h2{font-family:'Syne',sans-serif;font-size:23px;font-weight:800;letter-spacing:-.04em;margin-bottom:5px;}
.page-header p{font-size:14px;color:var(--sub);}

.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}

/* ── CARDS: no more white boxes — transparent sections ── */
.card{
  background:transparent;
  border:none;
  border-top:1px solid rgba(255,255,255,.06);
  padding:24px 0;
  animation:fadeIn .4s ease;
}
.card.boxed{
  background:rgba(255,255,255,.06);
  backdrop-filter:blur(20px) saturate(180%);
  -webkit-backdrop-filter:blur(20px) saturate(180%);
  border:1px solid rgba(255,255,255,.14) !important;
  padding:20px;
  box-shadow:0 8px 32px rgba(0,0,0,.3), inset 0 1px 0 rgba(255,255,255,.1);
}
.card-sm{padding:16px 0;}
.card-sm.boxed{padding:14px 18px;}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.card-title{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.26em;text-transform:uppercase;color:var(--ter);}
.card-action{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--iris);cursor:pointer;}
.card-action:hover{color:var(--text);}

/* STAT CARDS — coloured left-border, no box */
.stat-card{padding:16px 0 16px 18px;border-left:2px solid;animation:fadeIn .4s ease;}
.stat-card.c-aqua{border-color:var(--aqua);}
.stat-card.c-iris{border-color:var(--iris);}
.stat-card.c-rose{border-color:var(--rose);}
.stat-card.c-gold{border-color:var(--gold);}
.stat-val{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;letter-spacing:-.04em;line-height:1;margin-bottom:4px;}
.stat-label{font-size:13px;color:var(--sub);}
.stat-delta{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;color:var(--aqua);margin-top:8px;}
.stat-delta.warn{color:var(--gold);}
.stat-delta.neg{color:var(--rose);}

/* STATUS PILLS — for non-task contexts */
.pill{display:inline-flex;align-items:center;gap:5px;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.16em;text-transform:uppercase;padding:4px 10px;border:1px solid;}
.pill.active{border-color:rgba(6,214,160,.35);color:var(--aqua);background:rgba(6,214,160,.09);}
.pill.pending{border-color:rgba(255,209,102,.35);color:var(--gold);background:rgba(255,209,102,.09);}
.pill.review{border-color:rgba(124,131,229,.35);color:var(--iris);background:rgba(124,131,229,.09);}
.pill.overdue{border-color:rgba(255,107,157,.35);color:var(--rose);background:rgba(255,107,157,.09);}
.pill.complete{border-color:rgba(255,255,255,.14);color:var(--sub);background:rgba(255,255,255,.05);}
.pill-dot{width:5px;height:5px;border-radius:50%;background:currentColor;animation:pulse 2s infinite;}

/* ── STATUS-COLOURED TASK ROWS ── */
.task-row{display:flex;align-items:center;gap:0;margin-bottom:8px;overflow:hidden;transition:transform .15s;position:relative;}
.task-row:hover{transform:translateX(3px);}
.task-bar{width:3px;flex-shrink:0;align-self:stretch;min-height:62px;}
.task-row.s-active .task-bar{background:var(--aqua);}
.task-row.s-pending .task-bar{background:var(--gold);}
.task-row.s-review .task-bar{background:var(--iris);}
.task-row.s-overdue .task-bar{background:var(--rose);}
.task-row.s-complete .task-bar{background:rgba(255,255,255,.15);}
.task-body{
  flex:1;padding:14px 18px;
  backdrop-filter:blur(18px) saturate(160%);
  -webkit-backdrop-filter:blur(18px) saturate(160%);
  border-top:1px solid rgba(255,255,255,.1);
  border-right:1px solid rgba(255,255,255,.1);
  border-bottom:1px solid rgba(255,255,255,.06);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.08), 0 4px 20px rgba(0,0,0,.25);
  display:flex;align-items:center;gap:16px;
}
.task-row.s-active .task-body{background:rgba(6,214,160,.08);}
.task-row.s-pending .task-body{background:rgba(255,209,102,.08);}
.task-row.s-review .task-body{background:rgba(124,131,229,.10);}
.task-row.s-overdue .task-body{background:rgba(255,107,157,.10);}
.task-row.s-complete .task-body{background:rgba(255,255,255,.04);}
.task-main{flex:1;}
.task-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:3px;}
.task-sub{font-size:12px;color:var(--sub);}
.task-status-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.16em;text-transform:uppercase;flex-shrink:0;}
.task-row.s-active .task-status-label{color:var(--aqua);}
.task-row.s-pending .task-status-label{color:var(--gold);}
.task-row.s-review .task-status-label{color:var(--iris);}
.task-row.s-overdue .task-status-label{color:var(--rose);}
.task-row.s-complete .task-status-label{color:var(--ter);}

/* CLIENT ROWS */
.client-row{display:flex;align-items:center;gap:0;margin-bottom:6px;overflow:hidden;transition:transform .15s;}
.client-row:hover{transform:translateX(3px);}
.client-bar{width:3px;flex-shrink:0;align-self:stretch;min-height:54px;}
.client-row.s-active .client-bar{background:var(--aqua);}
.client-row.s-pending .client-bar{background:var(--gold);}
.client-row.s-overdue .client-bar{background:var(--rose);}
.client-body{flex:1;padding:12px 16px;display:flex;align-items:center;gap:14px;backdrop-filter:blur(18px) saturate(160%);-webkit-backdrop-filter:blur(18px) saturate(160%);border-top:1px solid rgba(255,255,255,.1);border-right:1px solid rgba(255,255,255,.1);border-bottom:1px solid rgba(255,255,255,.06);box-shadow:inset 0 1px 0 rgba(255,255,255,.07), 0 4px 16px rgba(0,0,0,.2);}
.client-row.s-active .client-body{background:rgba(6,214,160,.08);}
 .client-row.s-pending .client-body{background:rgba(255,209,102,.08);}
.client-row.s-overdue .client-body{background:rgba(255,107,157,.10);}

/* INVOICE ROWS */
.inv-row{display:flex;align-items:center;gap:0;margin-bottom:6px;overflow:hidden;}
.inv-bar{width:3px;flex-shrink:0;align-self:stretch;min-height:48px;}
.inv-row.i-paid .inv-bar{background:var(--aqua);}
.inv-row.i-pending .inv-bar{background:var(--gold);}
.inv-body{flex:1;padding:12px 16px;display:flex;align-items:center;gap:16px;backdrop-filter:blur(18px) saturate(160%);-webkit-backdrop-filter:blur(18px) saturate(160%);border-top:1px solid rgba(255,255,255,.1);border-right:1px solid rgba(255,255,255,.1);border-bottom:1px solid rgba(255,255,255,.06);box-shadow:inset 0 1px 0 rgba(255,255,255,.07), 0 4px 16px rgba(0,0,0,.2);}
.inv-row.i-paid .inv-body{background:rgba(6,214,160,.08);}
.inv-row.i-pending .inv-body{background:rgba(255,209,102,.08);}

/* PROGRESS BAR */
.progress-track{height:3px;background:rgba(255,255,255,.08);border-radius:999px;overflow:hidden;margin-top:10px;}
.progress-fill{height:100%;border-radius:999px;background:var(--chrome);background-size:300% 100%;animation:cSpin 4s linear infinite;transition:width .6s ease;}

/* TABLE — glass rows */
.tbl{width:100%;border-collapse:collapse;}
.tbl th{
  font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;
  color:var(--sub);padding:12px 14px;border-bottom:1px solid var(--glass-border);
  text-align:left;font-weight:500;
}
.tbl td{padding:14px 14px;font-size:14px;color:var(--sub);border-bottom:1px solid rgba(255,255,255,.05);line-height:1.45;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:rgba(255,255,255,.03);}
.tbl .td-main{color:var(--text);font-weight:500;font-size:14px;}
.tbl-action{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--iris);cursor:pointer;background:none;border:none;padding:0;}
.tbl-action:hover{color:var(--text);}

/* MILESTONE LIST */
.milestone{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.05);}
.milestone:last-child{border-bottom:none;}
.ms-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.ms-dot.done{background:var(--aqua);}
.ms-dot.active{background:var(--iris);box-shadow:0 0 0 3px rgba(124,131,229,.25);animation:pulse 2s infinite;}
.ms-dot.upcoming{background:transparent;border:1px solid rgba(255,255,255,.2);}
.ms-title{font-size:14px;font-weight:500;color:var(--text);margin-bottom:2px;}
.ms-date{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;color:var(--ter);}

/* FILE ROW — glass */
.file-row{
  display:flex;align-items:center;gap:12px;padding:12px 14px;
  border:1px solid var(--glass-border);margin-bottom:6px;
  background:var(--glass-bg);transition:all .15s;cursor:pointer;
  backdrop-filter:blur(8px);
}
.file-row:hover{border-color:var(--border2);background:var(--glass-bg-hover);}
.file-icon{width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:17px;background:rgba(255,255,255,.06);flex-shrink:0;border-radius:4px;}
.file-name{font-size:14px;font-weight:500;color:var(--text);flex:1;}
.file-meta{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.12em;color:var(--ter);}

/* INVOICE */
.inv-amount{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--text);}

/* MODAL — frosted glass */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(8px);z-index:500;display:none;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{
  background:rgba(6,6,12,.5);
  backdrop-filter:blur(52px) saturate(200%);
  -webkit-backdrop-filter:blur(52px) saturate(200%);
  border:1px solid rgba(255,255,255,.18);
  box-shadow:0 40px 80px rgba(0,0,0,.7), inset 0 1px 0 rgba(255,255,255,.15), inset 0 0 60px rgba(124,131,229,.04);
  width:540px;max-height:85vh;overflow-y:auto;animation:fadeUp .3s ease;
}
.modal-header{padding:24px 28px 18px;border-bottom:1px solid var(--glass-border);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-family:'Syne',sans-serif;font-size:19px;font-weight:800;letter-spacing:-.03em;}
.modal-close{background:none;border:none;color:var(--ter);font-size:22px;cursor:pointer;line-height:1;padding:0 4px;}
.modal-close:hover{color:var(--text);}
.modal-body{padding:24px 28px;font-size:14px;color:var(--sub);}
.modal-footer{padding:16px 28px;border-top:1px solid var(--glass-border);display:flex;gap:10px;justify-content:flex-end;}

/* FORM */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.form-field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.form-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--sub);}
.form-input,.form-select,.form-textarea{
  background:rgba(255,255,255,.05);border:1px solid var(--glass-border);color:var(--text);
  font-family:'DM Sans',sans-serif;font-size:14px;
  padding:11px 13px;outline:none;transition:border-color .2s,background .2s;width:100%;
}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--iris);background:rgba(124,131,229,.06);}
.form-input::placeholder{color:var(--ter);}
.form-textarea{resize:vertical;min-height:80px;line-height:1.6;}
.form-select option{background:var(--deep);}

/* BTN */
.btn{
  font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;
  padding:11px 22px;border:1px solid var(--glass-border);
  background:var(--glass-bg);color:var(--sub);cursor:pointer;transition:all .18s;
  backdrop-filter:blur(8px);
}
.btn:hover{background:var(--glass-bg-hover);border-color:var(--border2);color:var(--text);}
.btn.primary{background:var(--chrome);background-size:300% 300%;animation:cSpin 4s ease infinite;color:#060608;border-color:transparent;font-weight:700;}
.btn.danger{border-color:rgba(255,107,157,.3);color:var(--rose);}
.btn.danger:hover{background:rgba(255,107,157,.1);}

/* SUBSCRIPTION CARD */
.sub-card{background:var(--glass-bg);border:1px solid var(--glass-border);padding:20px;position:relative;backdrop-filter:blur(16px);}
.sub-tier{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;letter-spacing:-.03em;margin-bottom:4px;}
.sub-price{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;letter-spacing:-.04em;margin:12px 0 4px;}
.sub-price span{font-size:14px;font-weight:400;color:var(--sub);font-family:'DM Sans',sans-serif;}
.sub-features{list-style:none;margin:14px 0;}
.sub-features li{font-size:13px;color:var(--sub);padding:6px 0;display:flex;align-items:center;gap:8px;border-bottom:1px solid rgba(255,255,255,.05);}
.sub-features li:last-child{border-bottom:none;}
.sub-features li::before{content:'→';color:var(--iris);font-size:10px;flex-shrink:0;}

/* CHROME EDGE */
.chrome-edge{position:fixed;left:0;top:0;bottom:0;width:3px;background:var(--chrome);background-size:300% 300%;animation:cSpin 4s ease infinite;z-index:100;}

/* TOAST — glass */
.toast{
  position:fixed;bottom:24px;right:24px;
  background:rgba(20,20,28,.85);
  backdrop-filter:blur(24px);
  border:1px solid var(--glass-border);
  box-shadow:0 8px 32px rgba(0,0,0,.4);
  padding:14px 20px;font-size:13px;color:var(--text);
  z-index:9999;animation:fadeUp .3s ease;display:none;
}
.toast.show{display:block;}

/* UPLOAD ZONE — glass */
.upload-zone{
  border:1px dashed rgba(255,255,255,.15);padding:32px;text-align:center;cursor:pointer;
  transition:all .2s;margin-bottom:16px;background:var(--glass-bg);backdrop-filter:blur(8px);
}
.upload-zone:hover{border-color:var(--iris);background:rgba(124,131,229,.06);}
.upload-zone p{font-size:13px;color:var(--sub);margin-top:8px;}
.upload-zone .upload-icon{font-size:28px;margin-bottom:8px;}

/* APPROVE BTN */
.approve-btn{
  font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.16em;text-transform:uppercase;
  padding:7px 14px;border:1px solid rgba(6,214,160,.35);color:var(--aqua);
  background:rgba(6,214,160,.05);cursor:pointer;transition:all .18s;
}
.approve-btn:hover{background:rgba(6,214,160,.12);border-color:rgba(6,214,160,.5);}
.approve-btn.approved{border-color:rgba(255,255,255,.1);color:var(--ter);cursor:default;background:transparent;}

/* ACTIVITY FEED */
.activity-item{display:flex;gap:12px;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.05);}
.activity-item:last-child{border-bottom:none;}
.activity-dot{width:8px;height:8px;border-radius:50%;background:var(--iris);flex-shrink:0;margin-top:5px;}
.activity-text{font-size:13px;color:var(--sub);line-height:1.55;}
.activity-text strong{color:var(--text);}
.activity-time{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;color:var(--ter);margin-top:3px;}

/* NOTE CARD — glass */
.note{background:rgba(255,209,102,.06);border:1px solid rgba(255,209,102,.15);padding:14px;margin-bottom:8px;backdrop-filter:blur(8px);}
.note-meta{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.14em;color:var(--ter);margin-bottom:6px;}
.note-text{font-size:14px;color:var(--sub);line-height:1.65;}

/* ONBOARDING STEPS */
.ob-step{display:flex;gap:14px;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.05);}
.ob-step:last-child{border-bottom:none;}
.ob-num{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:9px;font-weight:700;flex-shrink:0;}
.ob-num.done{background:var(--aqua);color:#060608;}
.ob-num.current{background:var(--iris);color:#fff;}
.ob-num.todo{background:var(--lift);border:1px solid var(--border);color:var(--ter);}
.ob-title{font-size:13px;font-weight:500;color:var(--text);margin-bottom:2px;}
.ob-desc{font-size:12px;color:var(--ter);}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px;}
</style>
</head>

            <div style="font-weight:600;color:var(--text);font-size:14px;flex-shrink:0;">R${c.mrr.toLocaleString()}<span style="font-size:10px;color:var(--ter);font-weight:400;">/mo</span></div>
            <div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--ter);flex-shrink:0;">Renews ${c.renewal}</div>
            <div style="font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.14em;text-transform:uppercase;flex-shrink:0;color:${c.status==='active'?'var(--aqua)':c.status==='overdue'?'var(--rose)':'var(--gold)'};">${c.status}</div>
            <button class="tbl-action" onclick="openEditSub(${c.id})">Edit →</button>
          </div>
        </div>`).join('')}
    </div>`;
}

function openModal(title, bodyHTML, btnLabel, onConfirm) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = bodyHTML;
  document.getElementById('modalFooter').innerHTML = `
    <button class="btn" onclick="closeModal()">Cancel</button>
    ${btnLabel?`<button class="btn primary" onclick="${onConfirm?'confirmModal()':'closeModal()'}">${btnLabel}</button>`:''}`;
  window._modalConfirm = onConfirm;
  document.getElementById('modalOverlay').classList.add('open');
}
function confirmModal(){if(window._modalConfirm)window._modalConfirm();closeModal();}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');}
document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===this)closeModal();});

function approveDeliverable(id, btn) {
  btn.textContent = '✓ Approved';
  btn.classList.add('approved');
  btn.disabled = true;
  const d = deliverables.find(x=>x.id===id);
  if(d) d.status = 'approved';
  showToast('Deliverable approved — BRANSOL notified');
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 3000);
}
