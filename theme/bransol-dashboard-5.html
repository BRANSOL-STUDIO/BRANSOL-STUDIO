<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRANSOL — Client Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --void:#060608;--deep:#0a0a10;--surface:#111118;--lift:#18181f;--panel:#1e1e27;
  --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.14);
  --text:#f0eff5;--sub:rgba(240,239,245,.75);--ter:rgba(240,239,245,.45);
  --iris:#7c83e5;--aqua:#06d6a0;--violet:#c77dff;--rose:#ff6b9d;
  --gold:#ffd166;--sky:#45b7d1;--ember:#ff8c42;
  --chrome:linear-gradient(135deg,#ff6b9d,#ff8c42,#ffd166,#06d6a0,#4ecdc4,#45b7d1,#7c83e5,#c77dff);
  --glass-bg:rgba(255,255,255,.045);
  --glass-bg-hover:rgba(255,255,255,.07);
  --glass-border:rgba(255,255,255,.1);
  --glass-strong:rgba(255,255,255,.06);
  --sidebar-w:240px;--topbar-h:60px;
}
html,body{height:100%;overflow:hidden;}
body{
  background:#04040a;
  color:var(--text);font-family:'DM Sans',sans-serif;
  display:flex;flex-direction:column;
  position:relative;
}
body::before{
  content:'';
  position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 50% 50% at 75% 10%, rgba(124,131,229,.60) 0%, transparent 60%),
    radial-gradient(ellipse 38% 52% at 5%  78%, rgba(6,214,160,.48)   0%, transparent 58%),
    radial-gradient(ellipse 46% 40% at 94% 88%, rgba(199,125,255,.42) 0%, transparent 58%),
    radial-gradient(ellipse 32% 28% at 42% 52%, rgba(255,107,157,.22) 0%, transparent 52%),
    radial-gradient(ellipse 28% 24% at 18% 18%, rgba(69,183,209,.26)  0%, transparent 48%),
    radial-gradient(ellipse 70% 70% at 50% 50%, rgba(4,4,10,.92)      0%, transparent 100%);
  pointer-events:none;
}
#app,#loginScreen{position:relative;z-index:2;}

@keyframes cSpin{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
@keyframes orbDrift1{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(60px,-40px) scale(1.08)}66%{transform:translate(-30px,50px) scale(.94)}}
@keyframes orbDrift2{0%,100%{transform:translate(0,0) scale(1)}40%{transform:translate(-70px,30px) scale(1.05)}75%{transform:translate(40px,-60px) scale(.96)}}
@keyframes orbDrift3{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(50px,40px) scale(1.07)}}

/* ── ORBS ── */
.orb-layer{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden;}
.orb{position:absolute;border-radius:50%;filter:blur(80px);}
.orb1{width:560px;height:480px;top:-80px;right:10%;background:rgba(124,131,229,.45);animation:orbDrift1 18s ease-in-out infinite;}
.orb2{width:440px;height:520px;bottom:-60px;left:-60px;background:rgba(6,214,160,.38);animation:orbDrift2 22s ease-in-out infinite;}
.orb3{width:380px;height:360px;bottom:5%;right:-40px;background:rgba(199,125,255,.36);animation:orbDrift3 16s ease-in-out infinite;}
.orb4{width:260px;height:260px;top:40%;left:30%;background:rgba(255,107,157,.18);animation:orbDrift1 26s ease-in-out infinite reverse;}
.orb5{width:300px;height:280px;top:15%;left:5%;background:rgba(69,183,209,.22);animation:orbDrift2 20s ease-in-out infinite reverse;}

.chrome-text{background:var(--chrome);background-size:300% 300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:cSpin 5s ease infinite;}
.chrome-bg{background:var(--chrome);background-size:300% 300%;animation:cSpin 4s ease infinite;}

/* ══════════════════════════════════════════
   LOGIN SCREEN
══════════════════════════════════════════ */
#loginScreen{
  position:fixed;inset:0;z-index:1000;
  background:var(--void);
  background-image:
    radial-gradient(ellipse 60% 55% at 65% 25%, rgba(124,131,229,.55) 0%, transparent 62%),
    radial-gradient(ellipse 45% 48% at 15% 80%, rgba(6,214,160,.42) 0%, transparent 58%),
    radial-gradient(ellipse 35% 30% at 85% 75%, rgba(199,125,255,.35) 0%, transparent 55%);
  display:flex;align-items:center;justify-content:center;flex-direction:column;
}
.login-box{
  width:420px;
  background:rgba(8,8,16,.45);
  backdrop-filter:blur(48px) saturate(200%);
  -webkit-backdrop-filter:blur(48px) saturate(200%);
  border:1px solid rgba(255,255,255,.18);
  box-shadow:0 32px 80px rgba(0,0,0,.6), 0 0 0 1px rgba(255,255,255,.05) inset, inset 0 1px 0 rgba(255,255,255,.15);
  padding:48px;
  animation:fadeUp .6s ease;
}
.login-logo{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;margin-bottom:36px;display:block;}
.login-title{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;letter-spacing:-.04em;margin-bottom:6px;}
.login-sub{font-size:14px;color:var(--sub);margin-bottom:32px;}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
.field label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.26em;text-transform:uppercase;color:var(--ter);}
.field input{
  background:rgba(255,255,255,.05);
  border:1px solid var(--glass-border);
  color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;
  padding:12px 14px;outline:none;transition:border-color .2s;
  backdrop-filter:blur(8px);
}
.field input:focus{border-color:var(--iris);background:rgba(124,131,229,.07);}
.login-roles{display:flex;gap:8px;margin-bottom:24px;}
.role-btn{
  flex:1;padding:9px;border:1px solid var(--glass-border);
  background:rgba(255,255,255,.03);
  font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.2em;text-transform:uppercase;
  color:var(--ter);cursor:pointer;transition:all .18s;
}
.role-btn:hover{background:rgba(255,255,255,.06);color:var(--sub);}
.role-btn.active{background:rgba(124,131,229,.15);border-color:rgba(124,131,229,.5);color:var(--iris);}
.login-btn{
  width:100%;padding:14px;background:var(--chrome);background-size:300% 300%;
  animation:cSpin 4s ease infinite;border:none;color:#060608;
  font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.3em;text-transform:uppercase;
  cursor:pointer;font-weight:700;transition:opacity .2s;
}
.login-btn:hover{opacity:.88;}
.login-hint{font-size:12px;color:var(--ter);text-align:center;margin-top:16px;}

/* ══════════════════════════════════════════
   APP SHELL
══════════════════════════════════════════ */
#app{display:none;flex:1;overflow:hidden;flex-direction:row;}

/* SIDEBAR — glass panel */
.sidebar{
  width:var(--sidebar-w);flex-shrink:0;
  background:rgba(4,4,10,.55);
  backdrop-filter:blur(28px) saturate(180%);
  -webkit-backdrop-filter:blur(28px) saturate(180%);
  border-right:1px solid rgba(255,255,255,.12);
  display:flex;flex-direction:column;
  height:100vh;overflow-y:auto;
}
.sidebar-logo{
  padding:20px 20px 16px;
  font-family:'Syne',sans-serif;font-size:16px;font-weight:800;letter-spacing:-.02em;
  border-bottom:1px solid var(--glass-border);
  display:flex;align-items:center;gap:8px;flex-shrink:0;
}
.sidebar-logo .role-tag{
  font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.18em;text-transform:uppercase;
  padding:3px 7px;background:rgba(124,131,229,.15);border:1px solid rgba(124,131,229,.35);
  color:var(--iris);margin-left:auto;
}
.sidebar-logo .role-tag.admin{background:rgba(255,107,157,.1);border-color:rgba(255,107,157,.35);color:var(--rose);}

.nav-section{padding:12px 10px 4px;flex-shrink:0;}
.nav-item{
  display:flex;align-items:center;gap:10px;padding:10px 12px;
  font-size:13.5px;font-weight:400;color:var(--sub);cursor:pointer;
  border-radius:6px;transition:all .15s;margin-bottom:2px;
  border:1px solid transparent;user-select:none;
}
.nav-item:hover{background:var(--glass-bg-hover);color:var(--text);border-color:var(--glass-border);}
.nav-item.active{
  background:rgba(124,131,229,.12);
  border-color:rgba(124,131,229,.25);
  color:var(--text);font-weight:500;
  box-shadow:inset 0 0 20px rgba(124,131,229,.05);
}
.nav-item.active .nav-icon{color:var(--iris);}
.nav-icon{font-size:14px;width:18px;text-align:center;flex-shrink:0;opacity:.8;}
.nav-badge{margin-left:auto;font-family:'DM Mono',monospace;font-size:8px;
  background:var(--rose);color:#fff;padding:2px 6px;border-radius:999px;font-weight:700;}

.sidebar-footer{margin-top:auto;padding:16px;border-top:1px solid var(--glass-border);flex-shrink:0;}
.user-chip{display:flex;align-items:center;gap:10px;}
.user-avatar{
  width:32px;height:32px;border-radius:50%;
  background:var(--chrome);background-size:300% 300%;animation:cSpin 4s ease infinite;
  display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-size:11px;font-weight:800;color:#060608;flex-shrink:0;
}
.user-name{font-size:13px;font-weight:500;color:var(--text);}
.user-org{font-size:11px;color:var(--ter);}
.logout-btn{margin-left:auto;font-size:12px;color:var(--ter);cursor:pointer;padding:4px;}
.logout-btn:hover{color:var(--rose);}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}

/* TOPBAR — glass */
.topbar{
  height:var(--topbar-h);flex-shrink:0;
  border-bottom:1px solid var(--glass-border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 32px;
  background:rgba(4,4,10,.45);
  backdrop-filter:blur(24px) saturate(160%);
  -webkit-backdrop-filter:blur(24px) saturate(160%);
}
.topbar-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;letter-spacing:-.03em;}
.topbar-actions{display:flex;align-items:center;gap:10px;}
.tb-btn{
  font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.2em;text-transform:uppercase;
  padding:9px 18px;border:1px solid var(--glass-border);
  background:var(--glass-bg);color:var(--sub);cursor:pointer;transition:all .18s;
  backdrop-filter:blur(8px);border-radius:4px;
}
.tb-btn:hover{background:var(--glass-bg-hover);border-color:var(--border2);color:var(--text);}
.tb-btn.primary{background:var(--chrome);background-size:300% 300%;animation:cSpin 4s ease infinite;color:#060608;border-color:transparent;font-weight:700;}

/* CONTENT */
.content{flex:1;overflow-y:auto;padding:32px;}
.content.hidden{display:none;}

/* ══════════════════════════════════════════
   COMMON COMPONENTS
══════════════════════════════════════════ */
.page-header{margin-bottom:28px;animation:fadeUp .4s ease;}
.page-header h2{font-family:'Syne',sans-serif;font-size:23px;font-weight:800;letter-spacing:-.04em;margin-bottom:5px;}
.page-header p{font-size:14px;color:var(--sub);}

.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}

/* ── CARDS: no more white boxes — transparent sections ── */
.card{
  background:transparent;
  border:none;
  border-top:1px solid rgba(255,255,255,.06);
  padding:24px 0;
  animation:fadeIn .4s ease;
}
.card.boxed{
  background:rgba(255,255,255,.06);
  backdrop-filter:blur(20px) saturate(180%);
  -webkit-backdrop-filter:blur(20px) saturate(180%);
  border:1px solid rgba(255,255,255,.14) !important;
  padding:20px;
  box-shadow:0 8px 32px rgba(0,0,0,.3), inset 0 1px 0 rgba(255,255,255,.1);
}
.card-sm{padding:16px 0;}
.card-sm.boxed{padding:14px 18px;}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.card-title{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.26em;text-transform:uppercase;color:var(--ter);}
.card-action{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--iris);cursor:pointer;}
.card-action:hover{color:var(--text);}

/* STAT CARDS — coloured left-border, no box */
.stat-card{padding:16px 0 16px 18px;border-left:2px solid;animation:fadeIn .4s ease;}
.stat-card.c-aqua{border-color:var(--aqua);}
.stat-card.c-iris{border-color:var(--iris);}
.stat-card.c-rose{border-color:var(--rose);}
.stat-card.c-gold{border-color:var(--gold);}
.stat-val{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;letter-spacing:-.04em;line-height:1;margin-bottom:4px;}
.stat-label{font-size:13px;color:var(--sub);}
.stat-delta{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;color:var(--aqua);margin-top:8px;}
.stat-delta.warn{color:var(--gold);}
.stat-delta.neg{color:var(--rose);}

/* STATUS PILLS — for non-task contexts */
.pill{display:inline-flex;align-items:center;gap:5px;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.16em;text-transform:uppercase;padding:4px 10px;border:1px solid;}
.pill.active{border-color:rgba(6,214,160,.35);color:var(--aqua);background:rgba(6,214,160,.09);}
.pill.pending{border-color:rgba(255,209,102,.35);color:var(--gold);background:rgba(255,209,102,.09);}
.pill.review{border-color:rgba(124,131,229,.35);color:var(--iris);background:rgba(124,131,229,.09);}
.pill.overdue{border-color:rgba(255,107,157,.35);color:var(--rose);background:rgba(255,107,157,.09);}
.pill.complete{border-color:rgba(255,255,255,.14);color:var(--sub);background:rgba(255,255,255,.05);}
.pill-dot{width:5px;height:5px;border-radius:50%;background:currentColor;animation:pulse 2s infinite;}

/* ── STATUS-COLOURED TASK ROWS ── */
.task-row{display:flex;align-items:center;gap:0;margin-bottom:8px;overflow:hidden;transition:transform .15s;position:relative;}
.task-row:hover{transform:translateX(3px);}
.task-bar{width:3px;flex-shrink:0;align-self:stretch;min-height:62px;}
.task-row.s-active .task-bar{background:var(--aqua);}
.task-row.s-pending .task-bar{background:var(--gold);}
.task-row.s-review .task-bar{background:var(--iris);}
.task-row.s-overdue .task-bar{background:var(--rose);}
.task-row.s-complete .task-bar{background:rgba(255,255,255,.15);}
.task-body{
  flex:1;padding:14px 18px;
  backdrop-filter:blur(18px) saturate(160%);
  -webkit-backdrop-filter:blur(18px) saturate(160%);
  border-top:1px solid rgba(255,255,255,.1);
  border-right:1px solid rgba(255,255,255,.1);
  border-bottom:1px solid rgba(255,255,255,.06);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.08), 0 4px 20px rgba(0,0,0,.25);
  display:flex;align-items:center;gap:16px;
}
.task-row.s-active .task-body{background:rgba(6,214,160,.08);}
.task-row.s-pending .task-body{background:rgba(255,209,102,.08);}
.task-row.s-review .task-body{background:rgba(124,131,229,.10);}
.task-row.s-overdue .task-body{background:rgba(255,107,157,.10);}
.task-row.s-complete .task-body{background:rgba(255,255,255,.04);}
.task-main{flex:1;}
.task-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:3px;}
.task-sub{font-size:12px;color:var(--sub);}
.task-status-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.16em;text-transform:uppercase;flex-shrink:0;}
.task-row.s-active .task-status-label{color:var(--aqua);}
.task-row.s-pending .task-status-label{color:var(--gold);}
.task-row.s-review .task-status-label{color:var(--iris);}
.task-row.s-overdue .task-status-label{color:var(--rose);}
.task-row.s-complete .task-status-label{color:var(--ter);}

/* CLIENT ROWS */
.client-row{display:flex;align-items:center;gap:0;margin-bottom:6px;overflow:hidden;transition:transform .15s;}
.client-row:hover{transform:translateX(3px);}
.client-bar{width:3px;flex-shrink:0;align-self:stretch;min-height:54px;}
.client-row.s-active .client-bar{background:var(--aqua);}
.client-row.s-pending .client-bar{background:var(--gold);}
.client-row.s-overdue .client-bar{background:var(--rose);}
.client-body{flex:1;padding:12px 16px;display:flex;align-items:center;gap:14px;backdrop-filter:blur(18px) saturate(160%);-webkit-backdrop-filter:blur(18px) saturate(160%);border-top:1px solid rgba(255,255,255,.1);border-right:1px solid rgba(255,255,255,.1);border-bottom:1px solid rgba(255,255,255,.06);box-shadow:inset 0 1px 0 rgba(255,255,255,.07), 0 4px 16px rgba(0,0,0,.2);}
.client-row.s-active .client-body{background:rgba(6,214,160,.08);}
 .client-row.s-pending .client-body{background:rgba(255,209,102,.08);}
.client-row.s-overdue .client-body{background:rgba(255,107,157,.10);}

/* INVOICE ROWS */
.inv-row{display:flex;align-items:center;gap:0;margin-bottom:6px;overflow:hidden;}
.inv-bar{width:3px;flex-shrink:0;align-self:stretch;min-height:48px;}
.inv-row.i-paid .inv-bar{background:var(--aqua);}
.inv-row.i-pending .inv-bar{background:var(--gold);}
.inv-body{flex:1;padding:12px 16px;display:flex;align-items:center;gap:16px;backdrop-filter:blur(18px) saturate(160%);-webkit-backdrop-filter:blur(18px) saturate(160%);border-top:1px solid rgba(255,255,255,.1);border-right:1px solid rgba(255,255,255,.1);border-bottom:1px solid rgba(255,255,255,.06);box-shadow:inset 0 1px 0 rgba(255,255,255,.07), 0 4px 16px rgba(0,0,0,.2);}
.inv-row.i-paid .inv-body{background:rgba(6,214,160,.08);}
.inv-row.i-pending .inv-body{background:rgba(255,209,102,.08);}

/* PROGRESS BAR */
.progress-track{height:3px;background:rgba(255,255,255,.08);border-radius:999px;overflow:hidden;margin-top:10px;}
.progress-fill{height:100%;border-radius:999px;background:var(--chrome);background-size:300% 100%;animation:cSpin 4s linear infinite;transition:width .6s ease;}

/* TABLE — glass rows */
.tbl{width:100%;border-collapse:collapse;}
.tbl th{
  font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;
  color:var(--sub);padding:12px 14px;border-bottom:1px solid var(--glass-border);
  text-align:left;font-weight:500;
}
.tbl td{padding:14px 14px;font-size:14px;color:var(--sub);border-bottom:1px solid rgba(255,255,255,.05);line-height:1.45;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:rgba(255,255,255,.03);}
.tbl .td-main{color:var(--text);font-weight:500;font-size:14px;}
.tbl-action{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--iris);cursor:pointer;background:none;border:none;padding:0;}
.tbl-action:hover{color:var(--text);}

/* MILESTONE LIST */
.milestone{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.05);}
.milestone:last-child{border-bottom:none;}
.ms-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.ms-dot.done{background:var(--aqua);}
.ms-dot.active{background:var(--iris);box-shadow:0 0 0 3px rgba(124,131,229,.25);animation:pulse 2s infinite;}
.ms-dot.upcoming{background:transparent;border:1px solid rgba(255,255,255,.2);}
.ms-title{font-size:14px;font-weight:500;color:var(--text);margin-bottom:2px;}
.ms-date{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;color:var(--ter);}

/* ══ PROJECT CARDS ══ */
.proj-filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:24px;flex-wrap:wrap;}
.proj-filter-btn{
  font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.2em;text-transform:uppercase;
  padding:7px 14px;border:1px solid var(--glass-border);background:var(--glass-bg);
  color:var(--ter);cursor:pointer;transition:all .18s;backdrop-filter:blur(8px);
}
.proj-filter-btn:hover{color:var(--sub);border-color:var(--border2);}
.proj-filter-btn.active{background:rgba(124,131,229,.15);border-color:rgba(124,131,229,.45);color:var(--iris);}
.proj-filter-sep{flex:1;}
.proj-sort{
  font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.18em;text-transform:uppercase;
  padding:7px 12px;border:1px solid var(--glass-border);background:var(--glass-bg);
  color:var(--ter);cursor:pointer;transition:all .18s;backdrop-filter:blur(8px);
}

.proj-card{
  position:relative;overflow:hidden;margin-bottom:14px;
  border:1px solid var(--glass-border);
  background:rgba(255,255,255,.03);
  backdrop-filter:blur(24px) saturate(160%);
  -webkit-backdrop-filter:blur(24px) saturate(160%);
  box-shadow:0 8px 32px rgba(0,0,0,.25), inset 0 1px 0 rgba(255,255,255,.08);
  transition:transform .2s, box-shadow .2s, border-color .2s;
  cursor:pointer;
}
.proj-card:hover{transform:translateY(-2px);box-shadow:0 16px 48px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.1);border-color:rgba(255,255,255,.15);}
.proj-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;opacity:0;transition:opacity .2s;}
.proj-card:hover::before{opacity:1;}
.proj-accent{position:absolute;top:0;left:0;bottom:0;width:3px;}
.proj-header{padding:20px 22px 16px;display:flex;align-items:flex-start;justify-content:space-between;gap:16px;}
.proj-title-block{flex:1;min-width:0;}
.proj-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;letter-spacing:-.02em;color:var(--text);margin-bottom:5px;line-height:1.3;}
.proj-client-tag{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--ter);}
.proj-meta-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0;}
.proj-status-badge{
  font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.2em;text-transform:uppercase;
  padding:4px 10px;border:1px solid;
}
.proj-card.s-active   .proj-status-badge{color:var(--aqua);border-color:rgba(6,214,160,.35);background:rgba(6,214,160,.08);}
.proj-card.s-pending  .proj-status-badge{color:var(--gold);border-color:rgba(255,209,102,.35);background:rgba(255,209,102,.08);}
.proj-card.s-review   .proj-status-badge{color:var(--iris);border-color:rgba(124,131,229,.35);background:rgba(124,131,229,.08);}
.proj-card.s-overdue  .proj-status-badge{color:var(--rose);border-color:rgba(255,107,157,.35);background:rgba(255,107,157,.08);}
.proj-card.s-complete .proj-status-badge{color:var(--ter);border-color:rgba(255,255,255,.1);background:transparent;}
.proj-due{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;color:var(--ter);}
.proj-due.overdue{color:var(--rose);}

.proj-scope{padding:0 22px 14px;font-size:12px;color:var(--sub);line-height:1.5;}

.proj-progress-wrap{padding:0 22px 18px;}
.proj-progress-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;}
.proj-phase-name{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--sub);}
.proj-pct{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;color:var(--ter);}
.proj-track{height:4px;background:rgba(255,255,255,.07);border-radius:999px;overflow:hidden;position:relative;}
.proj-fill{height:100%;border-radius:999px;background:var(--chrome);background-size:300% 100%;animation:cSpin 5s linear infinite;transition:width .8s cubic-bezier(.4,0,.2,1);}

/* Phase timeline */
.proj-phases{padding:0 22px 18px;display:flex;align-items:center;gap:0;position:relative;}
.proj-phase-step{flex:1;display:flex;flex-direction:column;align-items:center;position:relative;}
.proj-phase-step:not(:last-child)::after{
  content:'';position:absolute;top:6px;left:50%;width:100%;height:1px;
  background:rgba(255,255,255,.1);z-index:0;
}
.proj-phase-step.done::after{background:rgba(6,214,160,.4);}
.proj-phase-dot{
  width:13px;height:13px;border-radius:50%;flex-shrink:0;
  position:relative;z-index:1;transition:all .2s;
}
.proj-phase-step.done   .proj-phase-dot{background:var(--aqua);box-shadow:0 0 0 3px rgba(6,214,160,.15);}
.proj-phase-step.active .proj-phase-dot{background:var(--iris);box-shadow:0 0 0 4px rgba(124,131,229,.25);animation:pulse 2s infinite;}
.proj-phase-step.upcoming .proj-phase-dot{background:transparent;border:1px solid rgba(255,255,255,.2);}
.proj-phase-label{font-family:'DM Mono',monospace;font-size:7.5px;letter-spacing:.1em;text-align:center;margin-top:7px;line-height:1.4;max-width:72px;}
.proj-phase-step.done    .proj-phase-label{color:var(--aqua);}
.proj-phase-step.active  .proj-phase-label{color:var(--iris);}
.proj-phase-step.upcoming .proj-phase-label{color:var(--ter);}
.proj-phase-step .proj-phase-date{font-family:'DM Mono',monospace;font-size:7px;color:rgba(240,239,245,.25);margin-top:3px;text-align:center;}

/* Bottom strip */
.proj-footer{
  padding:12px 22px;border-top:1px solid rgba(255,255,255,.06);
  display:flex;align-items:center;gap:20px;
  background:rgba(0,0,0,.12);
}
.proj-foot-stat{display:flex;flex-direction:column;gap:2px;}
.proj-foot-label{font-family:'DM Mono',monospace;font-size:7.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--ter);}
.proj-foot-val{font-size:13px;font-weight:600;color:var(--text);}
.proj-foot-sep{width:1px;height:28px;background:rgba(255,255,255,.07);flex-shrink:0;}
.proj-foot-team{display:flex;align-items:center;gap:6px;margin-left:auto;}
.proj-avatar{
  width:26px;height:26px;border-radius:50%;
  background:var(--glass-bg);border:1px solid var(--glass-border);
  font-family:'DM Mono',monospace;font-size:9px;font-weight:700;color:var(--sub);
  display:flex;align-items:center;justify-content:center;
  margin-left:-8px;
}
.proj-avatar:first-child{margin-left:0;}
.proj-actions{display:flex;gap:8px;margin-left:auto;}

/* Admin project grid header */
.proj-grid-head{
  display:grid;grid-template-columns:2fr 1.4fr 100px 100px 140px;
  padding:8px 16px;margin-bottom:6px;
}
.proj-grid-head span{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--ter);}

/* FILE ROW — glass */
.file-row{
  display:flex;align-items:center;gap:12px;padding:12px 14px;
  border:1px solid var(--glass-border);margin-bottom:6px;
  background:var(--glass-bg);transition:all .15s;cursor:pointer;
  backdrop-filter:blur(8px);
}
.file-row:hover{border-color:var(--border2);background:var(--glass-bg-hover);}
.file-icon{width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:17px;background:rgba(255,255,255,.06);flex-shrink:0;border-radius:4px;}
.file-name{font-size:14px;font-weight:500;color:var(--text);flex:1;}
.file-meta{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.12em;color:var(--ter);}

/* INVOICE */
.inv-amount{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--text);}

/* MODAL — frosted glass */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(8px);z-index:500;display:none;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{
  background:rgba(6,6,12,.5);
  backdrop-filter:blur(52px) saturate(200%);
  -webkit-backdrop-filter:blur(52px) saturate(200%);
  border:1px solid rgba(255,255,255,.18);
  box-shadow:0 40px 80px rgba(0,0,0,.7), inset 0 1px 0 rgba(255,255,255,.15), inset 0 0 60px rgba(124,131,229,.04);
  width:540px;max-height:85vh;overflow-y:auto;animation:fadeUp .3s ease;
}
.modal-header{padding:24px 28px 18px;border-bottom:1px solid var(--glass-border);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-family:'Syne',sans-serif;font-size:19px;font-weight:800;letter-spacing:-.03em;}
.modal-close{background:none;border:none;color:var(--ter);font-size:22px;cursor:pointer;line-height:1;padding:0 4px;}
.modal-close:hover{color:var(--text);}
.modal-body{padding:24px 28px;font-size:14px;color:var(--sub);}
.modal-footer{padding:16px 28px;border-top:1px solid var(--glass-border);display:flex;gap:10px;justify-content:flex-end;}

/* FORM */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.form-field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.form-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--sub);}
.form-input,.form-select,.form-textarea{
  background:rgba(255,255,255,.05);border:1px solid var(--glass-border);color:var(--text);
  font-family:'DM Sans',sans-serif;font-size:14px;
  padding:11px 13px;outline:none;transition:border-color .2s,background .2s;width:100%;
}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--iris);background:rgba(124,131,229,.06);}
.form-input::placeholder{color:var(--ter);}
.form-textarea{resize:vertical;min-height:80px;line-height:1.6;}
.form-select option{background:var(--deep);}

/* BTN */
.btn{
  font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;
  padding:11px 22px;border:1px solid var(--glass-border);
  background:var(--glass-bg);color:var(--sub);cursor:pointer;transition:all .18s;
  backdrop-filter:blur(8px);
}
.btn:hover{background:var(--glass-bg-hover);border-color:var(--border2);color:var(--text);}
.btn.primary{background:var(--chrome);background-size:300% 300%;animation:cSpin 4s ease infinite;color:#060608;border-color:transparent;font-weight:700;}
.btn.danger{border-color:rgba(255,107,157,.3);color:var(--rose);}
.btn.danger:hover{background:rgba(255,107,157,.1);}

/* SUBSCRIPTION CARD */
.sub-card{background:var(--glass-bg);border:1px solid var(--glass-border);padding:20px;position:relative;backdrop-filter:blur(16px);}
.sub-tier{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;letter-spacing:-.03em;margin-bottom:4px;}
.sub-price{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;letter-spacing:-.04em;margin:12px 0 4px;}
.sub-price span{font-size:14px;font-weight:400;color:var(--sub);font-family:'DM Sans',sans-serif;}
.sub-features{list-style:none;margin:14px 0;}
.sub-features li{font-size:13px;color:var(--sub);padding:6px 0;display:flex;align-items:center;gap:8px;border-bottom:1px solid rgba(255,255,255,.05);}
.sub-features li:last-child{border-bottom:none;}
.sub-features li::before{content:'→';color:var(--iris);font-size:10px;flex-shrink:0;}

/* ══ PROJECT DRAWER ══ */
@keyframes drawerIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
@keyframes drawerOut{from{transform:translateX(0)}to{transform:translateX(100%)}}
.proj-drawer-overlay{
  position:fixed;inset:0;z-index:400;
  background:rgba(0,0,0,0);pointer-events:none;
  transition:background .3s;
}
.proj-drawer-overlay.open{background:rgba(0,0,0,.55);pointer-events:all;backdrop-filter:blur(4px);}
.proj-drawer{
  position:absolute;top:0;right:0;bottom:0;width:680px;max-width:100vw;
  background:rgba(8,8,16,.72);
  backdrop-filter:blur(48px) saturate(180%);
  -webkit-backdrop-filter:blur(48px) saturate(180%);
  border-left:1px solid rgba(255,255,255,.12);
  box-shadow:-32px 0 80px rgba(0,0,0,.6), inset 1px 0 0 rgba(255,255,255,.06);
  display:flex;flex-direction:column;
  transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);
  overflow:hidden;
}
.proj-drawer-overlay.open .proj-drawer{transform:translateX(0);}
.proj-drawer-header{
  padding:20px 28px;border-bottom:1px solid rgba(255,255,255,.08);
  display:flex;align-items:center;gap:20px;flex-shrink:0;
  background:rgba(0,0,0,.2);
}
.proj-drawer-close{
  display:flex;align-items:center;gap:6px;
  font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;
  color:var(--ter);cursor:pointer;transition:color .15s;flex-shrink:0;
}
.proj-drawer-close:hover{color:var(--text);}
.proj-drawer-body{flex:1;overflow-y:auto;padding:0;}
.proj-drawer-body::-webkit-scrollbar{width:4px;}
.proj-drawer-body::-webkit-scrollbar-track{background:transparent;}
.proj-drawer-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);}

/* Drawer sections */
.pd-section{padding:24px 28px;border-bottom:1px solid rgba(255,255,255,.06);}
.pd-section:last-child{border-bottom:none;}
.pd-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.26em;text-transform:uppercase;color:var(--ter);margin-bottom:14px;}
.pd-hero{
  padding:28px 28px 24px;
  border-bottom:1px solid rgba(255,255,255,.06);
  position:relative;overflow:hidden;
}
.pd-hero::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 100% at 100% 0%, var(--pd-color, rgba(124,131,229,.18)) 0%, transparent 70%);
  pointer-events:none;
}
.pd-hero-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;letter-spacing:-.04em;margin-bottom:6px;line-height:1.2;}
.pd-hero-client{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--ter);margin-bottom:14px;}
.pd-hero-scope{font-size:13px;color:var(--sub);line-height:1.6;margin-bottom:18px;}
.pd-meta-row{display:flex;gap:24px;flex-wrap:wrap;}
.pd-meta-item{display:flex;flex-direction:column;gap:3px;}
.pd-meta-key{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.22em;text-transform:uppercase;color:var(--ter);}
.pd-meta-val{font-size:13px;font-weight:600;color:var(--text);}
.pd-badge{
  display:inline-block;font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.2em;
  text-transform:uppercase;padding:3px 10px;border:1px solid;
}

/* Phase timeline — vertical in drawer */
.pd-phase-list{display:flex;flex-direction:column;gap:0;}
.pd-phase-item{display:flex;align-items:flex-start;gap:16px;padding:12px 0;position:relative;}
.pd-phase-item:not(:last-child)::after{
  content:'';position:absolute;left:10px;top:28px;bottom:-12px;width:1px;
  background:rgba(255,255,255,.08);
}
.pd-phase-item.done::after{background:rgba(6,214,160,.3);}
.pd-phase-dot-wrap{flex-shrink:0;width:22px;height:22px;display:flex;align-items:center;justify-content:center;position:relative;z-index:1;}
.pd-phase-dot{width:12px;height:12px;border-radius:50%;}
.pd-phase-item.done   .pd-phase-dot{background:var(--aqua);box-shadow:0 0 0 4px rgba(6,214,160,.1);}
.pd-phase-item.active .pd-phase-dot{background:var(--iris);box-shadow:0 0 0 5px rgba(124,131,229,.2);animation:pulse 2s infinite;}
.pd-phase-item.upcoming .pd-phase-dot{background:transparent;border:1px solid rgba(255,255,255,.2);}
.pd-phase-text{flex:1;padding-top:3px;}
.pd-phase-name{font-size:13px;font-weight:500;margin-bottom:2px;}
.pd-phase-item.done    .pd-phase-name{color:var(--sub);}
.pd-phase-item.active  .pd-phase-name{color:var(--text);}
.pd-phase-item.upcoming .pd-phase-name{color:var(--ter);}
.pd-phase-date{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;color:var(--ter);}
.pd-phase-item.done .pd-phase-date{color:var(--aqua);opacity:.6;}
.pd-phase-item.active .pd-phase-date{color:var(--iris);opacity:.8;}
.pd-phase-check{font-size:11px;color:var(--aqua);margin-top:2px;}

/* Deliverables in drawer */
.pd-deliv-row{
  display:flex;align-items:center;gap:12px;padding:11px 14px;
  border:1px solid rgba(255,255,255,.07);margin-bottom:6px;
  background:rgba(255,255,255,.025);transition:all .15s;
}
.pd-deliv-row:hover{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.12);}
.pd-deliv-icon{
  width:32px;height:32px;border-radius:4px;display:flex;align-items:center;justify-content:center;
  font-size:14px;background:rgba(255,255,255,.06);flex-shrink:0;
}
.pd-deliv-name{font-size:13px;font-weight:500;color:var(--text);margin-bottom:2px;}
.pd-deliv-meta{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;color:var(--ter);}

/* Progress in drawer */
.pd-progress-wrap{margin-bottom:4px;}
.pd-progress-bar{height:6px;background:rgba(255,255,255,.07);border-radius:999px;overflow:hidden;margin-top:8px;}
.pd-progress-fill{height:100%;border-radius:999px;background:var(--chrome);background-size:300% 100%;animation:cSpin 5s linear infinite;transition:width .8s ease;}

/* Update form */
.pd-update-form{background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.08);padding:18px;}

/* ══ PROJECT DRAWER ══ */
.chrome-edge{position:fixed;left:0;top:0;bottom:0;width:3px;background:var(--chrome);background-size:300% 300%;animation:cSpin 4s ease infinite;z-index:100;}

/* TOAST — glass */
.toast{
  position:fixed;bottom:24px;right:24px;
  background:rgba(20,20,28,.85);
  backdrop-filter:blur(24px);
  border:1px solid var(--glass-border);
  box-shadow:0 8px 32px rgba(0,0,0,.4);
  padding:14px 20px;font-size:13px;color:var(--text);
  z-index:9999;animation:fadeUp .3s ease;display:none;
}
.toast.show{display:block;}

/* UPLOAD ZONE — glass */
.upload-zone{
  border:1px dashed rgba(255,255,255,.15);padding:32px;text-align:center;cursor:pointer;
  transition:all .2s;margin-bottom:16px;background:var(--glass-bg);backdrop-filter:blur(8px);
}
.upload-zone:hover{border-color:var(--iris);background:rgba(124,131,229,.06);}
.upload-zone p{font-size:13px;color:var(--sub);margin-top:8px;}
.upload-zone .upload-icon{font-size:28px;margin-bottom:8px;}

/* APPROVE BTN */
.approve-btn{
  font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.16em;text-transform:uppercase;
  padding:7px 14px;border:1px solid rgba(6,214,160,.35);color:var(--aqua);
  background:rgba(6,214,160,.05);cursor:pointer;transition:all .18s;
}
.approve-btn:hover{background:rgba(6,214,160,.12);border-color:rgba(6,214,160,.5);}
.approve-btn.approved{border-color:rgba(255,255,255,.1);color:var(--ter);cursor:default;background:transparent;}

/* ══ DELIVERABLES ══ */
.deliv-summary-row{display:flex;gap:12px;margin-bottom:28px;}
.deliv-sum-card{
  flex:1;padding:16px 18px;
  background:rgba(255,255,255,.03);border:1px solid var(--glass-border);
  backdrop-filter:blur(16px);position:relative;overflow:hidden;
}
.deliv-sum-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.deliv-sum-card.c-pending::before{background:var(--gold);}
.deliv-sum-card.c-approved::before{background:var(--aqua);}
.deliv-sum-card.c-all::before{background:var(--iris);}
.deliv-sum-num{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;letter-spacing:-.04em;margin-bottom:3px;}
.deliv-sum-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--ter);}

.deliv-filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
.deliv-filter-btn{
  font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.2em;text-transform:uppercase;
  padding:7px 14px;border:1px solid var(--glass-border);background:var(--glass-bg);
  color:var(--ter);cursor:pointer;transition:all .18s;backdrop-filter:blur(8px);
}
.deliv-filter-btn:hover{color:var(--sub);border-color:var(--border2);}
.deliv-filter-btn.active{background:rgba(124,131,229,.15);border-color:rgba(124,131,229,.45);color:var(--iris);}
.deliv-filter-sep{flex:1;}

.deliv-group{margin-bottom:28px;}
.deliv-group-header{
  display:flex;align-items:center;gap:12px;
  padding:10px 0;margin-bottom:10px;
  border-bottom:1px solid rgba(255,255,255,.07);
}
.deliv-group-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;letter-spacing:-.02em;color:var(--text);}
.deliv-group-count{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.16em;color:var(--ter);}
.deliv-group-bar{flex:1;height:1px;background:rgba(255,255,255,.04);}

.deliv-card{
  position:relative;margin-bottom:10px;
  border:1px solid var(--glass-border);
  background:rgba(255,255,255,.03);
  backdrop-filter:blur(20px) saturate(150%);
  -webkit-backdrop-filter:blur(20px) saturate(150%);
  box-shadow:0 4px 20px rgba(0,0,0,.2), inset 0 1px 0 rgba(255,255,255,.07);
  transition:border-color .2s, box-shadow .2s;
  overflow:hidden;
}
.deliv-card:hover{border-color:rgba(255,255,255,.14);box-shadow:0 8px 32px rgba(0,0,0,.3), inset 0 1px 0 rgba(255,255,255,.09);}
.deliv-card.status-approved{border-left:3px solid var(--aqua);}
.deliv-card.status-review{border-left:3px solid var(--gold);}
.deliv-card.status-changes{border-left:3px solid var(--rose);}

.deliv-card-main{padding:16px 20px;display:flex;align-items:flex-start;gap:16px;}
.deliv-type-icon{
  width:40px;height:44px;border-radius:4px;flex-shrink:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  border:1px solid rgba(255,255,255,.1);
}
.deliv-type-icon.pdf{background:rgba(255,107,157,.08);border-color:rgba(255,107,157,.2);}
.deliv-type-icon.zip{background:rgba(69,183,209,.08);border-color:rgba(69,183,209,.2);}
.deliv-type-icon.doc{background:rgba(124,131,229,.08);border-color:rgba(124,131,229,.2);}
.deliv-type-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.14em;font-weight:700;}
.deliv-type-icon.pdf .deliv-type-label{color:var(--rose);}
.deliv-type-icon.zip .deliv-type-label{color:var(--sky);}
.deliv-type-icon.doc .deliv-type-label{color:var(--iris);}

.deliv-name{font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px;line-height:1.3;}

.deliv-meta-tag{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.12em;color:var(--ter);}

.deliv-version{
  font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.14em;padding:2px 7px;
  border:1px solid rgba(255,255,255,.12);color:var(--sub);background:rgba(255,255,255,.04);
}
.deliv-note{font-size:12px;color:var(--sub);line-height:1.6;margin-top:4px;}

.deliv-status-col{display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0;}
.deliv-status-badge{
  font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.18em;text-transform:uppercase;
  padding:4px 10px;border:1px solid;
}
.status-approved .deliv-status-badge{color:var(--aqua);border-color:rgba(6,214,160,.35);background:rgba(6,214,160,.06);}
.status-review   .deliv-status-badge{color:var(--gold);border-color:rgba(255,209,102,.35);background:rgba(255,209,102,.06);}
.status-changes  .deliv-status-badge{color:var(--rose);border-color:rgba(255,107,157,.35);background:rgba(255,107,157,.06);}
.deliv-approved-date{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;color:var(--aqua);opacity:.6;}

.deliv-actions{display:flex;gap:8px;align-items:center;}
.deliv-dl-btn{
  font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.14em;text-transform:uppercase;
  padding:6px 12px;border:1px solid var(--glass-border);color:var(--ter);
  background:var(--glass-bg);cursor:pointer;transition:all .18s;
}
.deliv-dl-btn:hover{color:var(--text);border-color:var(--border2);background:rgba(255,255,255,.06);}

}

.deliv-comment-text{font-size:12px;color:var(--sub);line-height:1.6;}
.deliv-comment-date{font-family:'DM Mono',monospace;font-size:8px;color:var(--ter);margin-left:8px;}

.deliv-reply-btn:hover{background:rgba(124,131,229,.15);}

        <div style="margin:12px 10px 4px;padding-top:12px;border-top:1px solid var(--glass-border);">
          <span style="font-family:'DM Mono',monospace;font-size:7px;letter-spacing:.28em;text-transform:uppercase;color:var(--ter);padding:0 8px;">${n.label}</span>
        </div>`;
      const accentColor = n.accent === 'violet' ? 'var(--violet)' : null;
      const isActive = n.id === currentView;
      const activeStyle = isActive && accentColor
        ? `background:rgba(199,125,255,.1);border-color:rgba(199,125,255,.3);color:var(--violet);`
        : '';
      const hoverFn = accentColor && !isActive
        ? `onmouseover="this.style.color='var(--violet)'" onmouseout="this.style.color=''"` : '';
      return `
      <div class="nav-section" style="padding-bottom:0;padding-top:0;">
        <div class="nav-item${isActive?' active':''}" onclick="navigate('${n.id}')" style="${activeStyle}" ${hoverFn}>
          <span class="nav-icon" style="${accentColor && isActive ? 'color:var(--violet)' : ''}">${n.icon}</span>
          <span>${n.label}</span>
          ${n.badge ? `<span class="nav-badge">${n.badge}</span>` : ''}
        </div>
      </div>`;
    }).join('')}
    <div class="sidebar-footer">
      <div class="user-chip">
        <div class="user-avatar">${u.avatar}</div>
        <div><div class="user-name">${u.name}</div><div class="user-org">${u.org}</div></div>
        <div class="logout-btn" onclick="logout()" title="Sign out">⏻</div>
      </div>
    </div>`;
}

function navigate(view) {
  currentView = view;
  renderSidebar();
  const area = document.getElementById('contentArea');
  area.innerHTML = '';
  area.scrollTop = 0;

  const views = {
    dashboard: currentRole === 'client' ? renderClientDashboard : renderAdminDashboard,
    projects: currentRole === 'client' ? renderClientProjects : renderAdminProjects,
    deliverables: currentRole === 'client' ? renderClientDeliverables : renderAdminDeliverables,
    files: renderClientFiles,
    invoices: renderClientInvoices,
    subscription: renderClientSubscription,
    clients: renderAdminClients,
    onboard: renderOnboard,
    subscriptions: renderAdminSubscriptions,
    team: renderTeam,
    billing: renderBilling,
    perspectives: renderPerspectives,
  };

  const titles = {
    dashboard:'Dashboard', projects:'Projects', deliverables:'Deliverables',
    files:'Files', invoices:'Invoices & Billing', subscription:'Subscription',
    clients:'Clients', onboard:'Onboard Client', subscriptions:'Subscriptions',
    team:'Team & Admins', billing:'Billing', perspectives:'Perspectives',
  };

  document.getElementById('topbarTitle').textContent = titles[view] || view;

  // Topbar actions
  const actions = {
    files: `<button class="tb-btn primary" onclick="openUploadModal()">+ Upload File</button>`,
    clients: `<button class="tb-btn primary" onclick="navigate('onboard')">+ New Client</button>`,
    onboard: ``,
    projects: '',
    team: `<button class="tb-btn primary" onclick="openInviteAdmin()">+ Invite Admin</button>`,
    subscriptions: `<button class="tb-btn primary" onclick="openNewSubModal()">+ New Subscription</button>`,
    billing: `<button class="tb-btn" onclick="openDraftDoc('quote')">+ New Quote</button><button class="tb-btn primary" style="margin-left:8px;" onclick="openDraftDoc('invoice')">+ New Invoice</button>`,
    perspectives: currentRole === 'super_admin' ? `<button class="tb-btn primary" onclick="perspNewArticle()">+ New Article</button>` : `<button class="tb-btn primary" onclick="perspNewArticle()">+ New Article</button>`,
  };
  document.getElementById('topbarActions').innerHTML = actions[view] || '';

  if(views[view]) views[view]();
}

  else if(sortBy==='title') myProjects = [...myProjects].sort((a,b)=>a.title.localeCompare(b.title));

  const statusCounts = {all:projects.filter(p=>p.client==='National Communications Agency').length};
  ['active','pending','review'].forEach(s=>{ statusCounts[s]=projects.filter(p=>p.client==='National Communications Agency'&&p.status===s).length; });

    <div class="page-header"><h2>Projects</h2><p>${myProjects.length} commission${myProjects.length!==1?'s':''} · ${projects.filter(p=>p.client==='National Communications Agency'&&p.status==='active').length} active</p></div>

function postDelivComment(id, role) {
  const d = deliverables.find(x=>x.id===id);
  const inputId = role==='admin' ? `comment-admin-${id}` : `comment-${id}`;
  const input = document.getElementById(inputId);
  if(!d||!input||!input.value.trim()) return;
  d.comments.push({ author: role==='admin'?'Thabo Molefe':(currentUser?.name||'Sipho Dlamini'), date:'Just now', text:input.value.trim() });
  showToast('Comment posted');
  if(currentRole==='client') renderClientDeliverables(id);
  else renderAdminDeliverables();
}

function requestChanges(id) {
  const d = deliverables.find(x=>x.id===id);
  const input = document.getElementById(`comment-${id}`);
  const note = input?.value.trim();
  if(!d) return;
  d.status = 'changes';
  if(note) d.comments.push({ author: currentUser?.name||'Sipho Dlamini', date:'Just now', text:note });
  showToast('Change request sent — BRANSOL has been notified');
  renderClientDeliverables(id);
}

function toggleDelivDetail(key) {
  const el = document.getElementById(`deliv-detail-${key}`);
  if(!el) return;
  const open = el.style.display !== 'none';
  el.style.display = open ? 'none' : 'block';
  if(!open) { const inp = document.getElementById(`comment-${key}`); if(inp) inp.focus(); }
}


function renderAdminDeliverables(filter='all') {
  const area = document.getElementById('contentArea');
  const pending  = deliverables.filter(d=>d.status==='review').length;
  const approved = deliverables.filter(d=>d.status==='approved').length;
  const changes  = deliverables.filter(d=>d.status==='changes').length;

  let filtered = [...deliverables];
  if(filter==='review')   filtered = filtered.filter(d=>d.status==='review');
  if(filter==='approved') filtered = filtered.filter(d=>d.status==='approved');
  if(filter==='changes')  filtered = filtered.filter(d=>d.status==='changes');

  const order = {review:0, changes:1, approved:2};
  filtered.sort((a,b)=>(order[a.status]??3)-(order[b.status]??3));

  // group by project
  const groups = {};
  filtered.forEach(d=>{ if(!groups[d.project]) groups[d.project]=[]; groups[d.project].push(d); });

  area.innerHTML = `
    <div class="page-header" style="display:flex;align-items:flex-start;justify-content:space-between;">
      <div><h2>Deliverables</h2><p>${deliverables.length} files · ${pending} awaiting client approval</p></div>
      <button class="tb-btn primary" onclick="openUploadDeliverableModal()">+ Upload Deliverable</button>
    </div>

    <!-- Tab strip -->
    <div style="display:flex;gap:0;margin-bottom:28px;border-bottom:1px solid rgba(255,255,255,.08);">
      ${[
        ['all',      'All',              deliverables.length, 'var(--sub)'],
        ['review',   'Awaiting Approval',pending,             'var(--gold)'],
        ['changes',  'Changes Requested',changes,             'var(--rose)'],
        ['approved', 'Approved',         approved,            'var(--aqua)'],
      ].map(([f,l,n,c])=>`
        <button onclick="renderAdminDeliverables('${f}')" style="
          font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;
          padding:12px 20px;border:none;border-bottom:2px solid ${filter===f?c:'transparent'};
          background:none;color:${filter===f?c:'rgba(240,239,245,.35)'};cursor:pointer;
          transition:all .18s;display:flex;align-items:center;gap:8px;
        ">${l}${n>0?`<span style="font-size:9px;background:${filter===f?c:'rgba(255,255,255,.1)'};color:${filter===f?'#060608':'rgba(240,239,245,.5)'};padding:1px 6px;border-radius:99px;">${n}</span>`:''}</button>
      `).join('')}
    </div>

    ${filtered.length===0 ? `<div style="padding:60px;text-align:center;"><div style="font-size:32px;margin-bottom:12px;">✓</div><div style="font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.2em;color:var(--ter);">NOTHING HERE</div></div>` : ''}

    ${Object.entries(groups).map(([proj, items])=>`
      <div style="margin-bottom:28px;">
        <div style="display:flex;align-items:center;gap:12px;padding:8px 0;margin-bottom:10px;border-bottom:1px solid rgba(255,255,255,.07);">
          <span style="font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--text);">${proj}</span>
          <span style="font-family:'DM Mono',monospace;font-size:9px;color:var(--ter);">${items.length} file${items.length!==1?'s':''}</span>
          <div style="flex:1;"></div>
          <button class="deliv-dl-btn" onclick="openUploadDeliverableModal('${proj}')">+ Add File</button>
        </div>
        ${items.map(d=>adminDelivRowHTML(d)).join('')}

    `).join('')}`;
}

  const hasComments = d.comments && d.comments.length > 0;

  return `
  <div style="
    margin-bottom:8px;border:1px solid rgba(255,255,255,.07);

        <div style="font-size:14px;">${d.type==='PDF'?'📄':'📦'}</div>
        <div style="font-family:'DM Mono',monospace;font-size:7px;letter-spacing:.1em;color:var(--ter);">${d.type}</div>
      </div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px;">${d.name}</div>
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
          <span style="font-family:'DM Mono',monospace;font-size:9px;color:var(--ter);">${d.version}</span>
          <span style="color:rgba(255,255,255,.15);">·</span>
          <span style="font-family:'DM Mono',monospace;font-size:9px;color:var(--ter);">${d.size}</span>
          <span style="color:rgba(255,255,255,.15);">·</span>
          <span style="font-family:'DM Mono',monospace;font-size:9px;color:var(--ter);">${d.date}</span>
          <span style="color:rgba(255,255,255,.15);">·</span>
          <span style="font-family:'DM Mono',monospace;font-size:9px;color:var(--ter);">By ${d.uploadedBy}</span>
        </div>
      </div>

        ${hasComments?`<button class="deliv-dl-btn" onclick="toggleDelivDetail('admin-${d.id}')">${d.comments.length} comment${d.comments.length!==1?'s':''}</button>`:''}
        <button class="deliv-dl-btn" onclick="toggleDelivDetail('admin-${d.id}')">+ Note</button>
        <button class="deliv-dl-btn" onclick="showToast('Download started')">↓</button>
      </div>
    </div>
    ${d.note?`<div style="padding:0 18px 12px;padding-left:72px;font-size:12px;color:rgba(240,239,245,.4);line-height:1.6;">${d.note}</div>`:''}
    <div id="deliv-detail-admin-${d.id}" style="display:none;border-top:1px solid rgba(255,255,255,.06);background:rgba(0,0,0,.15);padding:14px 18px;">
      ${hasComments ? d.comments.map(c=>`

          <div style="width:22px;height:22px;border-radius:50%;flex-shrink:0;background:rgba(199,125,255,.15);border:1px solid rgba(199,125,255,.25);font-family:'DM Mono',monospace;font-size:8px;color:var(--violet);display:flex;align-items:center;justify-content:center;font-weight:700;">${c.author.split(' ').map(w=>w[0]).join('')}</div>

function renderAdminProjects(filterStatus='all', sortBy='client') {
  const area = document.getElementById('contentArea');
  let list = [...projects];
  if(filterStatus!=='all') list = list.filter(p=>p.status===filterStatus);
  if(sortBy==='progress') list = list.sort((a,b)=>b.progress-a.progress);
  else if(sortBy==='due') list = list.sort((a,b)=>{ if(a.due==='Overdue') return -1; if(b.due==='Overdue') return 1; return 0; });
  else list = list.sort((a,b)=>a.client.localeCompare(b.client));

  const counts = { all:projects.length };
  ['active','pending','review','overdue'].forEach(s=>{ counts[s]=projects.filter(p=>p.status===s).length; });

  area.innerHTML = `
    <div class="page-header" style="display:flex;align-items:flex-start;justify-content:space-between;">
      <div><h2>All Projects</h2><p>${list.length} project${list.length!==1?'s':''} · ${clients.filter(c=>c.status==='active').length} active clients</p></div>
      <button class="tb-btn primary" onclick="openNewProjectModal()">+ New Project</button>
    </div>

    <div class="proj-filter-bar">
      ${[['all','All'],['active','Active'],['pending','Pending'],['review','In Review'],['overdue','Overdue']].map(([s,l])=>`
        <button class="proj-filter-btn ${filterStatus===s?'active':''}" onclick="renderAdminProjects('${s}','${sortBy}')">${l} <span style="opacity:.5;">${counts[s]||0}</span></button>
      `).join('')}

      <select class="proj-sort" onchange="renderAdminProjects('${filterStatus}',this.value)">

function billingDocRow(d) {
  const isInvoice = d.type === 'invoice';

    paid:'Paid', pending:'Pending', open:'Open',
    accepted:'Accepted', expired:'Expired', declined:'Declined'

  return `
  <div style="
    display:flex;align-items:center;gap:16px;padding:16px 20px;margin-bottom:8px;

  " onmouseover="this.style.background='var(--glass-bg-hover)'" onmouseout="this.style.background='var(--glass-bg)'"

      color:${isInvoice?'var(--iris)':'var(--aqua)'};
      background:${isInvoice?'rgba(124,131,229,.07)':'rgba(6,214,160,.07)'};
      flex-shrink:0;

    <!-- ID + description -->

      <div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px;">${d.id} <span style="font-weight:400;color:var(--ter);">—</span> ${d.desc}</div>
      <div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--ter);">${d.client} · ${d.date}</div>
    </div>

    <!-- Amount -->
    <div style="font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--text);flex-shrink:0;">
      R${d.amount.toLocaleString('en-ZA',{minimumFractionDigits:2})}

    <!-- Status -->
    <div style="font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:${statusColor};width:80px;text-align:right;flex-shrink:0;">${statusLabel}</div>

    <!-- Actions -->

  </div>`;
}

function markBillingPaid(id) {
  const doc = billingDocs.find(d=>d.id===id);
  if(doc) doc.status = 'paid';
  showToast('Invoice ' + id + ' marked as paid');
  renderBilling();
}

function convertQuoteToInvoice(id) {
  const q = billingDocs.find(d=>d.id===id);
  if(!q) return;
  const newId = 'BSL-' + (2508 + billingDocs.filter(d=>d.type==='invoice').length);
  billingDocs.unshift({ id:newId, type:'invoice', status:'pending', client:q.client, amount:q.amount, date:new Date().toLocaleDateString('en-ZA',{day:'numeric',month:'short',year:'numeric'}), due:'Net 14 days', desc:q.desc });
  showToast('Quote converted → Invoice ' + newId + ' created');
  renderBilling();
}

function addDraftItemRow() {
  const container = document.getElementById('draftItems');
  if(!container) return;
  const row = document.createElement('div');
  row.className = 'draft-item-row';
  row.style.cssText = 'display:grid;grid-template-columns:1fr 80px 110px;gap:8px;margin-bottom:8px;';
  row.innerHTML = `
    <input class="form-input" placeholder="Description" style="font-size:12px;">
    <input class="form-input" placeholder="Qty" type="number" value="1" style="font-size:12px;" oninput="updateDraftTotal()">
    <input class="form-input" placeholder="Rate (excl. VAT)" type="number" style="font-size:12px;" oninput="updateDraftTotal()">`;
  container.appendChild(row);
}

function updateDraftTotal() {
  const rows = document.querySelectorAll('.draft-item-row');
  let subtotal = 0;
  rows.forEach(row => {
    const inputs = row.querySelectorAll('input');
    const qty  = parseFloat(inputs[1]?.value) || 0;
    const rate = parseFloat(inputs[2]?.value) || 0;
    subtotal += qty * rate;
  });
  const vat   = subtotal * 0.15;
  const total = subtotal + vat;
  const fmt = n => 'R' + n.toLocaleString('en-ZA', {minimumFractionDigits:2});
  const s = document.getElementById('draftSubtotal');
  const v = document.getElementById('draftVat');
  const t = document.getElementById('draftTotal');
  if(s) s.textContent = fmt(subtotal);
  if(v) v.textContent = fmt(vat);
  if(t) t.textContent = fmt(total);
}

function saveDraftDoc(type) {
  const client = document.getElementById('draftClient')?.value || '';
  const desc   = document.getElementById('draftDesc')?.value   || 'New ' + type;
  const attach = document.getElementById('draftAttach')?.checked;

  const rows = document.querySelectorAll('.draft-item-row');
  let subtotal = 0;
  rows.forEach(row => {
    const inputs = row.querySelectorAll('input');
    const qty  = parseFloat(inputs[1]?.value) || 0;
    const rate = parseFloat(inputs[2]?.value) || 0;
    subtotal += qty * rate;
  });
  const total = subtotal * 1.15;

  const prefix = type === 'invoice' ? 'BSL-' : 'BSL-Q0';
  const num    = type === 'invoice'
    ? (2500 + billingDocs.filter(d=>d.type==='invoice').length + 1)
    : ('0' + (billingDocs.filter(d=>d.type==='quote').length + 1)).slice(-2);
  const id = prefix + num;

  billingDocs.unshift({
    id, type, status: type==='invoice'?'pending':'open',
    client, amount: total,
    date: new Date().toLocaleDateString('en-ZA',{day:'numeric',month:'short',year:'numeric'}),
    due: 'Net 14 days',
    desc,
  });

  showToast(
    (type==='invoice'?'Invoice':'Quote') + ' ' + id + ' created' +
    (attach ? ' and attached to ' + client : '') +
    ' — ready to send'
  );
  renderBilling();
}

function closeProjectDrawer() {
  document.getElementById('projDrawerOverlay').classList.remove('open');
}

function postDrawerUpdate(id) {
  const p = projects.find(x=>x.id===id);
  if(!p) return;
  const msg = document.getElementById('drawerUpdateMsg')?.value;
  const pct = document.getElementById('drawerUpdatePct')?.value;
  const status = document.getElementById('drawerUpdateStatus')?.value;
  if(msg) p.milestone = msg;
  if(pct!==undefined) p.progress = parseInt(pct);
  if(status) p.status = status;
  showToast('Update posted — client notified');
  closeProjectDrawer();
  // re-render whichever view is active
  if(currentRole==='client') renderClientProjects();
  else renderAdminProjects();
}


function openModal(title, bodyHTML, btnLabel, onConfirm) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = bodyHTML;
  document.getElementById('modalFooter').innerHTML = `
    <button class="btn" onclick="closeModal()">Cancel</button>
    ${btnLabel?`<button class="btn primary" onclick="${onConfirm?'confirmModal()':'closeModal()'}">${btnLabel}</button>`:''}`;
  window._modalConfirm = onConfirm;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(){document.getElementById('modalOverlay').classList.remove('open');}

const BLOG_STORE = 'bransol_blog_articles';
const BLOG_SEED = [
  {id:'a1',slug:'why-government-design-procurement-is-broken',title:'Why Government Design Procurement Is Still Broken',excerpt:'South Africa spends billions annually on government communications. A fraction produces work that is genuinely fit for purpose.',category:'procurement',date:'2026-02-18',dateDisplay:'18 Feb 2026',readTime:'8 min',author:'BRANSOL Editorial',authorRole:'Studio',featured:true,published:true},
  {id:'a2',slug:'the-case-for-design-systems-in-enterprise',title:'The Case for Design Systems in Enterprise Organisations',excerpt:'Enterprise organisations waste millions annually on inconsistent design outputs.',category:'strategy',date:'2026-01-30',dateDisplay:'30 Jan 2026',readTime:'6 min',author:'BRANSOL Studio',authorRole:'Studio',featured:false,published:true},
  {id:'a3',slug:'what-procurement-panels-actually-want',title:'What Procurement Panels Actually Want From a Design Agency',excerpt:'The evaluation criteria for formal design tenders rarely align with what good design actually requires.',category:'procurement',date:'2026-01-14',dateDisplay:'14 Jan 2026',readTime:'5 min',author:'BRANSOL Studio',authorRole:'Studio',featured:false,published:true},
  {id:'a4',slug:'brand-identity-is-not-a-logo',title:'A Brand Identity Is Not a Logo — It Is an Operating System',excerpt:'Organisations that treat brand identity as a visual exercise routinely underinvest in it.',category:'identity',date:'2025-12-10',dateDisplay:'10 Dec 2025',readTime:'7 min',author:'BRANSOL Studio',authorRole:'Studio',featured:false,published:true},
  {id:'a5',slug:'south-african-design-industry-2026',title:'The State of the South African Design Industry Heading Into 2026',excerpt:'The industry is bifurcating. Studios doing work that requires senior judgement are thriving.',category:'industry',date:'2025-11-20',dateDisplay:'20 Nov 2025',readTime:'9 min',author:'BRANSOL Editorial',authorRole:'Studio',featured:false,published:true},
  {id:'a6',slug:'why-your-digital-presence-is-your-credentials',title:'Your Digital Presence Is Your Credentials Document',excerpt:'Before any formal engagement, procurement panels will have already assessed your digital presence.',category:'digital',date:'2025-10-08',dateDisplay:'08 Oct 2025',readTime:'5 min',author:'BRANSOL Studio',authorRole:'Studio',featured:false,published:true}
];

const PERSP_CAT = {
  strategy:    {label:'Strategy',       color:'var(--iris)'},
  procurement: {label:'Procurement',    color:'var(--aqua)'},
  identity:    {label:'Brand Identity', color:'var(--violet)'},
  industry:    {label:'Industry',       color:'var(--gold)'},
  digital:     {label:'Digital',        color:'var(--sky)'}
};

function pbLoad() {
  try { const s = localStorage.getItem(BLOG_STORE); if(s) return JSON.parse(s); } catch(e){}
  pbSave(BLOG_SEED); return BLOG_SEED;
}
function pbSave(a) { try { localStorage.setItem(BLOG_STORE, JSON.stringify(a)); } catch(e){} }
function pbUpsert(article) {
  const arts = pbLoad();
  const idx = arts.findIndex(a=>a.id===article.id);
  if(idx>=0) arts[idx]=article; else arts.unshift(article);
  if(article.featured) arts.forEach(a=>{ if(a.id!==article.id) a.featured=false; });
  pbSave(arts);
}
function pbDelete(id) { pbSave(pbLoad().filter(a=>a.id!==id)); }
function pbToggleFeatured(id) {
  const arts = pbLoad();
  arts.forEach(a=>{ a.featured = a.id===id ? !a.featured : false; });
  pbSave(arts);
}

let perspEditId = null;
let perspView = 'list'; // 'list' | 'form'

function renderPerspectives() {
  perspView = 'list';
  perspEditId = null;
  _renderPerspList();
}

function perspNewArticle() {
  perspView = 'form';
  perspEditId = null;
  _renderPerspForm(null);
  document.getElementById('topbarActions').innerHTML =
    `<button class="tb-btn" onclick="renderPerspectives()">← Back to list</button>`;
}

function _renderPerspList() {
  const arts = pbLoad();
  const canDel = currentRole === 'super_admin';
  const published = arts.filter(a=>a.published!==false).length;
  const drafts = arts.length - published;

  const area = document.getElementById('contentArea');
  area.innerHTML = `
    <div class="page-header" style="margin-bottom:24px;">
      <h2>Perspectives</h2>
      <p>${arts.length} articles &nbsp;·&nbsp; ${published} published &nbsp;·&nbsp; ${drafts} draft${drafts!==1?'s':''}</p>
    </div>

    <div class="card" style="margin-bottom:20px;padding:0;overflow:hidden;">
      <div style="padding:16px 20px;border-bottom:1px solid var(--glass-border);display:flex;align-items:center;justify-content:space-between;">
        <span style="font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--ter);">All Articles</span>
        <div style="display:flex;gap:6px;">
          <span style="font-family:'DM Mono',monospace;font-size:9px;color:var(--iris);">${arts.length} total</span>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:0;">
        ${arts.map(a => {
          const cat = PERSP_CAT[a.category] || {label:a.category, color:'var(--iris)'};
          return `
          <div style="display:flex;align-items:center;gap:14px;padding:14px 20px;border-bottom:1px solid var(--glass-border);transition:background .15s;${a.featured?'border-left:2px solid var(--gold);':'border-left:2px solid transparent;'}" onmouseover="this.style.background='rgba(255,255,255,.03)'" onmouseout="this.style.background='transparent'">
            <div style="flex:1;min-width:0;">
              <div style="font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:-.01em;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px;">${a.title}</div>
              <div style="display:flex;align-items:center;gap:10px;font-family:'DM Mono',monospace;font-size:8px;color:var(--ter);">
                <span style="color:${cat.color}">${cat.label}</span>
                <span>·</span>
                <span>${a.dateDisplay}</span>
                <span>·</span>
                <span>${a.readTime}</span>
                ${a.featured ? '<span style="color:var(--gold)">· ★ Featured</span>' : ''}
                ${a.published===false ? '<span style="color:var(--rose)">· Draft</span>' : ''}
              </div>
            </div>
            <div style="display:flex;gap:6px;flex-shrink:0;">
              <button class="tb-btn" style="font-size:8px;padding:5px 10px;" onclick="perspToggleFeat('${a.id}')">${a.featured?'Unfeature':'Feature'}</button>
              <button class="tb-btn" style="font-size:8px;padding:5px 10px;color:var(--iris);border-color:rgba(124,131,229,.3);" onclick="perspEdit('${a.id}')">Edit</button>
              <a href="../bransol-article.html?slug=${a.slug}" target="_blank" style="font-family:'DM Mono',monospace;font-size:8px;padding:5px 10px;border:1px solid var(--glass-border);color:var(--ter);text-decoration:none;display:inline-flex;align-items:center;" title="Preview">↗</a>
              ${canDel ? `<button class="tb-btn" style="font-size:8px;padding:5px 10px;color:var(--rose);border-color:rgba(255,107,157,.3);" onclick="perspDel('${a.id}')">Delete</button>` : ''}
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
}

function _renderPerspForm(article) {
  const a = article || {};
  const isEdit = !!a.id;
  const area = document.getElementById('contentArea');

  area.innerHTML = `
    <div class="page-header" style="margin-bottom:24px;">
      <h2>${isEdit ? 'Edit Article' : 'New Article'}</h2>
      <p>${isEdit ? `Editing: ${a.title}` : 'Create a new Perspectives article'}</p>
    </div>

    <div id="perspNotice"></div>

    <div class="card" style="padding:28px 32px;">
      <form onsubmit="perspSubmit(event)" style="display:flex;flex-direction:column;gap:20px;">

        <div style="display:flex;flex-direction:column;gap:7px;">
          <label style="font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.22em;text-transform:uppercase;color:var(--ter);">Title *</label>
          <input id="pf-title" value="${a.title||''}" placeholder="Article headline" required
            style="background:rgba(255,255,255,.04);border:1px solid var(--glass-border);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:11px 14px;outline:none;transition:border-color .2s;width:100%;"
            oninput="if(!${isEdit}||!document.getElementById('pf-slug').value){document.getElementById('pf-slug').value=this.value.toLowerCase().replace(/[^a-z0-9\\s-]/g,'').replace(/\\s+/g,'-').slice(0,80);}"
            onfocus="this.style.borderColor='var(--iris)'" onblur="this.style.borderColor='var(--glass-border)'">
        </div>

        <div style="display:flex;flex-direction:column;gap:7px;">
          <label style="font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.22em;text-transform:uppercase;color:var(--ter);">Slug *</label>
          <input id="pf-slug" value="${a.slug||''}" placeholder="url-friendly-slug" required
            style="background:rgba(255,255,255,.04);border:1px solid var(--glass-border);color:var(--text);font-family:'DM Mono',monospace;font-size:12px;padding:11px 14px;outline:none;transition:border-color .2s;width:100%;"
            onfocus="this.style.borderColor='var(--iris)'" onblur="this.style.borderColor='var(--glass-border)'">
        </div>

        <div style="display:flex;flex-direction:column;gap:7px;">
          <label style="font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.22em;text-transform:uppercase;color:var(--ter);">Excerpt *</label>
          <textarea id="pf-excerpt" placeholder="Short summary shown on blog index" required rows="3"
            style="background:rgba(255,255,255,.04);border:1px solid var(--glass-border);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:11px 14px;outline:none;transition:border-color .2s;width:100%;resize:vertical;line-height:1.6;"
            onfocus="this.style.borderColor='var(--iris)'" onblur="this.style.borderColor='var(--glass-border)'">${a.excerpt||''}</textarea>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
          <div style="display:flex;flex-direction:column;gap:7px;">
            <label style="font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.22em;text-transform:uppercase;color:var(--ter);">Category *</label>
            <select id="pf-cat" required
              style="background:rgba(255,255,255,.04);border:1px solid var(--glass-border);color:var(--text);font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.1em;padding:11px 14px;outline:none;cursor:pointer;width:100%;">
              ${Object.entries(PERSP_CAT).map(([k,v])=>`<option value="${k}" style="background:var(--panel)"${a.category===k?' selected':''}>${v.label}</option>`).join('')}
            </select>
          </div>
          <div style="display:flex;flex-direction:column;gap:7px;">
            <label style="font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.22em;text-transform:uppercase;color:var(--ter);">Read Time</label>
            <input id="pf-read" value="${a.readTime||'5 min'}" placeholder="e.g. 6 min"
              style="background:rgba(255,255,255,.04);border:1px solid var(--glass-border);color:var(--text);font-family:'DM Mono',monospace;font-size:12px;padding:11px 14px;outline:none;transition:border-color .2s;width:100%;"
              onfocus="this.style.borderColor='var(--iris)'" onblur="this.style.borderColor='var(--glass-border)'">
          </div>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
          <div style="display:flex;flex-direction:column;gap:7px;">
            <label style="font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.22em;text-transform:uppercase;color:var(--ter);">Publish Date *</label>
            <input id="pf-date" type="date" value="${a.date||new Date().toISOString().slice(0,10)}" required
              style="background:rgba(255,255,255,.04);border:1px solid var(--glass-border);color:var(--text);font-family:'DM Mono',monospace;font-size:12px;padding:11px 14px;outline:none;transition:border-color .2s;width:100%;"
              onfocus="this.style.borderColor='var(--iris)'" onblur="this.style.borderColor='var(--glass-border)'">
          </div>
          <div style="display:flex;flex-direction:column;gap:7px;">
            <label style="font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.22em;text-transform:uppercase;color:var(--ter);">Author</label>
            <input id="pf-author" value="${a.author||'BRANSOL Studio'}" placeholder="Author name"
              style="background:rgba(255,255,255,.04);border:1px solid var(--glass-border);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:11px 14px;outline:none;transition:border-color .2s;width:100%;"
              onfocus="this.style.borderColor='var(--iris)'" onblur="this.style.borderColor='var(--glass-border)'">
          </div>
        </div>

        <div style="display:flex;flex-direction:column;gap:7px;">
          <label style="font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.22em;text-transform:uppercase;color:var(--ter);">Body Content</label>
          <textarea id="pf-body" placeholder="Write the article body here. Supports basic HTML: &lt;h2&gt;, &lt;p&gt;, &lt;strong&gt;, &lt;em&gt;. Leave blank if publishing from external source." rows="12"
            style="background:rgba(255,255,255,.04);border:1px solid var(--glass-border);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:11px 14px;outline:none;transition:border-color .2s;width:100%;resize:vertical;line-height:1.65;"
            onfocus="this.style.borderColor='var(--iris)'" onblur="this.style.borderColor='var(--glass-border)'">${a.body||''}</textarea>
          <span style="font-family:'DM Mono',monospace;font-size:8px;color:var(--ter);letter-spacing:.1em;">Tip: wrap sections in &lt;h2 id="s1"&gt;Heading&lt;/h2&gt; to enable the article page's table of contents.</span>
        </div>

        <div style="display:flex;align-items:center;gap:32px;padding:16px 0;border-top:1px solid var(--glass-border);">
          <div style="display:flex;align-items:center;gap:10px;">
            <div id="tog-featured" class="pf-toggle ${a.featured?'on':''}" onclick="this.classList.toggle('on')" style="width:38px;height:20px;border-radius:999px;border:1px solid var(--glass-border);background:${a.featured?'rgba(124,131,229,.2)':'rgba(255,255,255,.06)'};position:relative;cursor:pointer;transition:background .2s,border-color .2s;">
              <div style="position:absolute;top:2px;left:${a.featured?'18px':'2px'};width:14px;height:14px;border-radius:50%;background:${a.featured?'var(--iris)':'var(--ter)'};transition:left .2s,background .2s;"></div>
            </div>
            <span style="font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:var(--sub);">Featured</span>
          </div>
          <div style="display:flex;align-items:center;gap:10px;">
            <div id="tog-published" class="pf-toggle ${a.published!==false?'on':''}" onclick="this.classList.toggle('on')" style="width:38px;height:20px;border-radius:999px;border:1px solid var(--glass-border);background:${a.published!==false?'rgba(6,214,160,.2)':'rgba(255,255,255,.06)'};position:relative;cursor:pointer;transition:background .2s,border-color .2s;">
              <div style="position:absolute;top:2px;left:${a.published!==false?'18px':'2px'};width:14px;height:14px;border-radius:50%;background:${a.published!==false?'var(--aqua)':'var(--ter)'};transition:left .2s,background .2s;"></div>
            </div>
            <span style="font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:var(--sub);">Published</span>
          </div>
        </div>

        <div style="display:flex;gap:10px;">
          <button type="submit" class="tb-btn primary" style="flex:1;padding:13px;">${isEdit?'Save Changes':'Publish Article'}</button>
          <button type="button" class="tb-btn" style="padding:13px 20px;" onclick="renderPerspectives();document.getElementById('topbarActions').innerHTML='<button class=\\'tb-btn primary\\' onclick=\\'perspNewArticle()\\'>+ New Article</button>';">Cancel</button>
        </div>

      </form>
    </div>`;
}

function perspToggleFeat(id) {
  pbToggleFeatured(id);
  showToast('Featured article updated');
  _renderPerspList();
}

function perspEdit(id) {
  const a = pbLoad().find(x=>x.id===id);
  if(!a) return;
  perspEditId = id;
  perspView = 'form';
  _renderPerspForm(a);
  document.getElementById('topbarActions').innerHTML =
    `<button class="tb-btn" onclick="renderPerspectives()">← Back to list</button>`;
}

function perspDel(id) {
  if(currentRole !== 'super_admin') return showToast('Only super admins can delete articles.');
  if(!confirm('Delete this article? This cannot be undone.')) return;
  pbDelete(id);
  showToast('Article deleted');
  _renderPerspList();
}

function perspSubmit(e) {
  e.preventDefault();
  const date = document.getElementById('pf-date').value;
  const d = new Date(date + 'T12:00:00');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const dateDisplay = `${String(d.getDate()).padStart(2,'0')} ${months[d.getMonth()]} ${d.getFullYear()}`;

  const togFeat = document.getElementById('tog-featured');
  const togPub  = document.getElementById('tog-published');

  const article = {
    id:         perspEditId || ('a' + Date.now()),
    slug:       document.getElementById('pf-slug').value.trim(),
    title:      document.getElementById('pf-title').value.trim(),
    excerpt:    document.getElementById('pf-excerpt').value.trim(),
    body:       document.getElementById('pf-body').value.trim(),
    category:   document.getElementById('pf-cat').value,
    date,
    dateDisplay,
    readTime:   document.getElementById('pf-read').value.trim() || '5 min',
    author:     document.getElementById('pf-author').value.trim() || 'BRANSOL Studio',
    authorRole: 'Studio',
    featured:   togFeat.classList.contains('on'),
    published:  togPub.classList.contains('on'),
  };

  pbUpsert(article);
  showToast(perspEditId ? 'Article updated.' : 'Article published to Perspectives.');
  perspEditId = null;
  perspView = 'list';
  renderPerspectives();
  document.getElementById('topbarActions').innerHTML =
    `<button class="tb-btn primary" onclick="perspNewArticle()">+ New Article</button>`;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
