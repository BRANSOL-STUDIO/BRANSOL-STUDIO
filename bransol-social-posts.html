<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRANSOL — Social Content</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --void:#060608;--deep:#0d0d12;--surface:#111118;--lift:#18181f;--panel:#1e1e27;
  --border:rgba(255,255,255,.07);--text:#f0eff5;--sub:rgba(240,239,245,.6);--ter:rgba(240,239,245,.28);
  --iris:#7c83e5;--aqua:#06d6a0;--violet:#c77dff;--rose:#ff6b9d;
  --gold:#ffd166;--sky:#45b7d1;--ember:#ff8c42;
  --chrome:linear-gradient(135deg,#ff6b9d,#ff8c42,#ffd166,#06d6a0,#4ecdc4,#45b7d1,#7c83e5,#c77dff);
}
body{background:var(--void);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;padding:40px 24px 80px;}
@keyframes cSpin{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

.chrome-text{background:var(--chrome);background-size:300% 300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:cSpin 5s ease infinite;}

/* ── HEADER ── */
header{max-width:960px;margin:0 auto 48px;}
.logo{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;margin-bottom:32px;display:inline-block;}
h1{font-family:'Syne',sans-serif;font-size:clamp(28px,4vw,44px);font-weight:800;letter-spacing:-.04em;line-height:1;margin-bottom:12px;}
.subtitle{font-size:14px;color:var(--sub);line-height:1.6;max-width:520px;}

/* ── CONTROLS ── */
.controls{max-width:960px;margin:0 auto 36px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.ctrl-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.28em;text-transform:uppercase;color:var(--ter);margin-right:4px;}
.filter-btn{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.22em;text-transform:uppercase;padding:8px 16px;border:1px solid var(--border);background:transparent;color:var(--ter);cursor:pointer;transition:all .18s;}
.filter-btn:hover{border-color:rgba(255,255,255,.18);color:var(--sub);}
.filter-btn.active{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.2);color:var(--text);}
.filter-btn[data-p="linkedin"].active{border-color:var(--sky);color:var(--sky);}
.filter-btn[data-p="instagram"].active{border-color:var(--rose);color:var(--rose);}
.filter-btn[data-p="twitter"].active{border-color:var(--gold);color:var(--gold);}
.filter-btn[data-t="sharp"].active{border-color:var(--iris);color:var(--iris);}
.filter-btn[data-t="authority"].active{border-color:var(--aqua);color:var(--aqua);}
.filter-btn[data-t="bts"].active{border-color:var(--violet);color:var(--violet);}
.sep{width:1px;height:24px;background:var(--border);margin:0 4px;}

/* ── GRID ── */
.grid{max-width:960px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}

/* ── CARD ── */
.card{background:var(--surface);border:1px solid var(--border);display:flex;flex-direction:column;transition:border-color .2s,transform .2s;animation:fadeUp .4s ease both;}
.card:hover{border-color:rgba(255,255,255,.14);transform:translateY(-2px);}
.card.hidden{display:none;}

.card-header{padding:16px 20px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.platform-badge{display:flex;align-items:center;gap:8px;}
.platform-icon{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;}
.platform-icon.linkedin{background:rgba(69,183,209,.15);}
.platform-icon.instagram{background:rgba(255,107,157,.15);}
.platform-icon.twitter{background:rgba(255,209,102,.15);}
.platform-name{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--ter);}
.tone-pill{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.18em;text-transform:uppercase;padding:3px 8px;border:1px solid;opacity:.7;}
.tone-pill.sharp{border-color:var(--iris);color:var(--iris);}
.tone-pill.authority{border-color:var(--aqua);color:var(--aqua);}
.tone-pill.bts{border-color:var(--violet);color:var(--violet);}

.card-body{padding:20px;flex:1;display:flex;flex-direction:column;gap:12px;}
.post-text{font-size:13.5px;line-height:1.75;color:var(--sub);white-space:pre-line;flex:1;}
.post-text .hook{color:var(--text);font-weight:500;}
.post-text .hashtag{color:var(--iris);opacity:.7;font-size:12px;}

.card-footer{padding:12px 20px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.post-meta{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.16em;text-transform:uppercase;color:var(--ter);}
.copy-btn{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.2em;text-transform:uppercase;padding:6px 14px;border:1px solid var(--border);background:transparent;color:var(--ter);cursor:pointer;transition:all .18s;}
.copy-btn:hover{border-color:rgba(255,255,255,.18);color:var(--text);}
.copy-btn.copied{border-color:var(--aqua);color:var(--aqua);}

/* Visual mock for Instagram */
.card[data-platform="instagram"] .card-body{padding:0;}
.insta-visual{width:100%;aspect-ratio:1;background:var(--lift);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;flex-shrink:0;}
.insta-visual svg{width:100%;height:100%;}
.insta-caption{padding:16px 20px;flex:1;display:flex;flex-direction:column;gap:10px;}

/* count */
.count{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.2em;color:var(--ter);max-width:960px;margin:0 auto 20px;}
</style>
</head>
<body>

<header>
  <div class="logo"><span class="chrome-text">BRAN</span><span>SOL</span></div>
  <h1>Social Content<br><span class="chrome-text">12 Posts</span></h1>
  <p class="subtitle">LinkedIn · Instagram · X — rotating across Sharp, Authoritative, and Behind-the-scenes tones. Click any card to copy.</p>
</header>

<div class="controls">
  <span class="ctrl-label">Platform</span>
  <button class="filter-btn active" data-p="all">All</button>
  <button class="filter-btn" data-p="linkedin">LinkedIn</button>
  <button class="filter-btn" data-p="instagram">Instagram</button>
  <button class="filter-btn" data-p="twitter">X / Twitter</button>
  <div class="sep"></div>
  <span class="ctrl-label">Tone</span>
  <button class="filter-btn active" data-t="all">All</button>
  <button class="filter-btn" data-t="sharp">Sharp</button>
  <button class="filter-btn" data-t="authority">Authority</button>
  <button class="filter-btn" data-t="bts">Behind-the-scenes</button>
</div>

<div class="count" id="count">Showing 12 posts</div>
<div class="grid" id="grid"></div>

<script>

    platform:"linkedin", tone:"sharp", week:"Week 1",
    text:`Most design briefs sent to agencies contain the answer to why the last agency failed.

Before we open a file, we read.

Design for institutions is not decoration.
It's the translation of an organisation's intent into something a person can trust on sight.

You can't do that without understanding what the organisation is trying to say — and what it's been saying wrong.

The reading takes longer than the drawing.`,
    tags:"#DesignProcess #BrandDesign #BRANSOL"
  },

    platform:"linkedin", tone:"sharp", week:"Week 5",
    text:`The most expensive design decision most organisations make is choosing the cheapest option.

Not because cheap work is badly executed.
Because cheap work is designed for the wrong outcome.

A R15,000 brand identity is built to be delivered.
A R150,000 brand identity is built to perform.

It's what the designer is optimising for.

We optimise for the room it enters — the boardroom, the prospectus, the tender, the public.

That room has standards.`,

01 — Typography that holds across 200 pages

Studio · Ballito, KwaZulu-Natal

#DesignStudio #BrandingProcess #BRANSOL #KZN`,

    platform:"instagram", tone:"authority", week:"Week 4",

    caption:`94% client retention.

Not because we're easy to work with.
Because we're precise about who we work with.

We commission a brief before we accept one.
We ask the questions the client hasn't thought to answer yet.

That precision is what creates work that lasts.

#BrandDesign #DesignAgency #ClientRetention #BRANSOL`,
  },

    text:`The brief said: "make it look premium."

That's not a brief.
That's a symptom.

Premium is earned by what you say, not how you style it.`,
    tags:""
  },
  {
    platform:"twitter", tone:"authority", week:"Week 2",
    text:`Institutions that invest in design systems outperform those that don't — not in aesthetics, but in consistency.

Every inconsistent touchpoint costs trust.
Trust, once lost in a formal context, is expensive to recover.

// ─── RENDER ──────────────────────────────────────────────────
function platformIcon(p){
  return p==='linkedin'?LI:p==='instagram'?IG:TW;
}
function platformName(p){
  return p==='linkedin'?'LinkedIn':p==='instagram'?'Instagram':'X / Twitter';
}
function toneLabel(t){
  return t==='sharp'?'Sharp':t==='authority'?'Authority':'Behind-the-scenes';
}
function toneClass(t){return t;}

function buildCards(){
  const grid=document.getElementById('grid');
  grid.innerHTML='';
  posts.forEach((p,i)=>{
    const card=document.createElement('div');
    card.className=`card`;
    card.dataset.platform=p.platform;
    card.dataset.tone=p.tone;
    card.style.animationDelay=(i*40)+'ms';

    let bodyHTML='';
    if(p.platform==='instagram'){
      bodyHTML=`<div class="insta-visual">${instaVisual(p.visual)}</div>
      <div class="insta-caption">
        <div class="post-text">${p.caption.replace(/#(\w+)/g,'<span class="hashtag">#$1</span>').replace(/\n/g,'<br>')}</div>
      </div>`;
    } else {
      const textFormatted=(p.text+(p.tags?'\n\n'+p.tags:'')).replace(/#(\w+)/g,'<span class="hashtag">#$1</span>').replace(/\n/g,'<br>');
      bodyHTML=`<div class="post-text">${textFormatted}</div>`;
    }

    const copyText = p.platform==='instagram' ? p.caption : (p.text+(p.tags?'\n\n'+p.tags:''));

    card.innerHTML=`
      <div class="card-header">
        <div class="platform-badge">
          <div class="platform-icon ${p.platform}">${platformIcon(p.platform)}</div>
          <span class="platform-name">${platformName(p.platform)}</span>
        </div>
        <span class="tone-pill ${toneClass(p.tone)}">${toneLabel(p.tone)}</span>
      </div>
      <div class="card-body">${bodyHTML}</div>
      <div class="card-footer">
        <span class="post-meta">${p.week}</span>
        <button class="copy-btn" onclick="copyPost(this, ${JSON.stringify(copyText).replace(/</g,'\\u003c')})">Copy</button>
      </div>`;
    grid.appendChild(card);
  });
  updateCount();
}

function copyPost(btn, text){
  navigator.clipboard.writeText(text).then(()=>{
    btn.textContent='Copied';btn.classList.add('copied');
    setTimeout(()=>{btn.textContent='Copy';btn.classList.remove('copied');},2000);
  });
}

// ─── FILTERS ─────────────────────────────────────────────────
let activePlatform='all', activeTone='all';

document.querySelectorAll('.filter-btn[data-p]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.filter-btn[data-p]').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    activePlatform=btn.dataset.p;
    applyFilters();
  });
});
document.querySelectorAll('.filter-btn[data-t]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.filter-btn[data-t]').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    activeTone=btn.dataset.t;
    applyFilters();
  });
});

function applyFilters(){
  const cards=document.querySelectorAll('.card');
  let visible=0;
  cards.forEach(c=>{
    const pMatch=activePlatform==='all'||c.dataset.platform===activePlatform;
    const tMatch=activeTone==='all'||c.dataset.tone===activeTone;
    const show=pMatch&&tMatch;
    c.classList.toggle('hidden',!show);
    if(show)visible++;
  });
  document.getElementById('count').textContent=`Showing ${visible} post${visible!==1?'s':''}`;
}

function updateCount(){
  const total=document.querySelectorAll('.card:not(.hidden)').length;
  document.getElementById('count').textContent=`Showing ${total} posts`;
}

buildCards();
</script>
</body>
</html>
